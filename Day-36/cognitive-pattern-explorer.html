<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Pattern Explorer</title>
<style>
  :root{
    --ink:#2b2b26;
    --paper:#f2ede3;
    --paper-2:#e8e0d0;
    --moss:#5c7a63;
    --moss-deep:#3f5a46;
    --clay:#a9765a;
    --dusk:#6b6f9c;
    --line:rgba(43,43,38,0.14);
    --radius:18px;
    --shadow: 0 10px 30px rgba(43,43,38,0.10);
    --dur: 420ms;
    --ease: cubic-bezier(.22,.9,.32,1);
  }
  [data-mode="stress"]{
    --paper:#efe6f3;
    --paper-2:#e3d5ea;
    --moss:#6b5b95;
    --moss-deep:#4d3f73;
    --clay:#c17a8a;
    --dusk:#3f5a46;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family: "Iowan Old Style","Palatino Linotype","URW Palladio", Georgia, serif;
    background: radial-gradient(1200px 600px at 20% -10%, var(--paper-2), var(--paper) 60%);
    color:var(--ink);
    min-height:100vh;
    transition: background var(--dur) var(--ease);
    overflow-x:hidden;
  }
  .sans{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

  .ambient{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .ambient span{
    position:absolute; border-radius:50%;
    background: radial-gradient(circle at 30% 30%, var(--moss), transparent 70%);
    opacity:.14; filter: blur(6px);
    animation: drift 18s ease-in-out infinite;
  }
  .ambient span:nth-child(1){ width:340px; height:340px; top:-80px; left:-60px; animation-delay:0s;}
  .ambient span:nth-child(2){ width:260px; height:260px; bottom:-60px; right:-40px; background:radial-gradient(circle at 30% 30%, var(--clay), transparent 70%); animation-delay:3s;}
  .ambient span:nth-child(3){ width:200px; height:200px; top:40%; right:10%; background:radial-gradient(circle at 30% 30%, var(--dusk), transparent 70%); animation-delay:6s;}
  @keyframes drift{
    0%,100%{ transform: translate(0,0) scale(1);}
    50%{ transform: translate(20px,-24px) scale(1.06);}
  }

  .app{ position:relative; z-index:1; max-width:920px; margin:0 auto; padding:28px 20px 80px; }

  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:22px; flex-wrap:wrap;
  }
  .brand{ font-size:1.35rem; letter-spacing:.02em; font-weight:600; }
  .brand small{ display:block; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size:.68rem; color:var(--moss-deep); letter-spacing:.16em; text-transform:uppercase; margin-top:2px;}

  .mode-toggle{
    display:inline-flex; background:var(--paper-2); border-radius:999px; padding:4px; gap:2px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.08);
  }
  .mode-toggle button{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    border:none; background:transparent; padding:8px 16px; border-radius:999px; cursor:pointer;
    font-size:.82rem; color:var(--ink); opacity:.6; transition: all .25s var(--ease);
  }
  .mode-toggle button[aria-pressed="true"]{
    background: var(--moss); color:#fff; opacity:1; box-shadow: var(--shadow);
  }
  .mode-toggle button:focus-visible{ outline:2px solid var(--moss-deep); outline-offset:2px; }

  .progress-wrap{ margin: 6px 0 30px; }
  .progress-track{
    height:6px; border-radius:999px; background:var(--paper-2); overflow:hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,.08);
  }
  .progress-fill{
    height:100%; background: linear-gradient(90deg, var(--moss), var(--clay));
    width:0%; transition: width .6s var(--ease);
  }
  .progress-steps{
    display:flex; justify-content:space-between; margin-top:8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--ink); opacity:.55;
  }
  .progress-steps span.active{ opacity:1; color:var(--moss-deep); font-weight:600; }

  .card{
    background: rgba(255,255,255,0.55);
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(6px);
  }
  @media (max-width:600px){ .card{ padding:20px; } }

  .screen{ animation: rise var(--dur) var(--ease); }
  @keyframes rise{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  h1{ font-size:2rem; margin:0 0 6px; line-height:1.15; }
  h2{ font-size:1.5rem; margin:0 0 10px; }
  p.lede{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color:var(--ink); opacity:.78; line-height:1.6; max-width:60ch; }

  .btn{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display:inline-flex; align-items:center; gap:8px;
    background: var(--moss); color:#fff; border:none; padding:13px 26px;
    border-radius:999px; font-size:.95rem; cursor:pointer; font-weight:600;
    box-shadow: var(--shadow); transition: transform .2s var(--ease), background .2s;
  }
  .btn:hover{ transform: translateY(-2px); background: var(--moss-deep); }
  .btn:focus-visible{ outline:3px solid var(--dusk); outline-offset:3px; }
  .btn.ghost{ background:transparent; color:var(--moss-deep); border:1.5px solid var(--moss); box-shadow:none; }
  .btn.ghost:hover{ background: var(--paper-2); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }

  .nav-row{ display:flex; justify-content:space-between; align-items:center; margin-top:28px; gap:12px; flex-wrap:wrap;}

  .scenario{ margin-bottom:26px; }
  .scenario .prompt{ font-size:1.12rem; margin-bottom:14px; }
  .options{ display:grid; gap:10px; }
  .option{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    text-align:left; width:100%; padding:14px 18px; border-radius:12px;
    border:1.5px solid var(--line); background:rgba(255,255,255,.5);
    cursor:pointer; font-size:.95rem; color:var(--ink); transition: all .2s var(--ease);
  }
  .option:hover{ border-color:var(--moss); background:#fff; transform: translateX(3px); }
  .option:focus-visible{ outline:2px solid var(--moss-deep); outline-offset:2px; }
  .option[aria-pressed="true"]{
    border-color:var(--moss); background: linear-gradient(90deg, rgba(92,122,99,.14), transparent);
    font-weight:600;
  }

  .dnd-layout{ display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:18px; }
  @media (max-width:640px){ .dnd-layout{ grid-template-columns:1fr; } }
  .pool, .dropzone{
    min-height:280px; border-radius:14px; padding:14px;
    border:2px dashed var(--line); background:rgba(255,255,255,.35);
  }
  .dropzone{ border-style:solid; }
  .dropzone.dragover{ border-color:var(--clay); background:rgba(169,118,90,.08); }
  .zone-label{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; opacity:.6; margin-bottom:10px;
  }
  .drag-card{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background:#fff; border-radius:10px; padding:12px 14px; margin-bottom:10px;
    box-shadow: 0 3px 10px rgba(0,0,0,.08); cursor:grab; user-select:none;
    border:1px solid var(--line); font-size:.92rem; touch-action:none;
    transition: transform .15s var(--ease), box-shadow .15s;
  }
  .drag-card:active{ cursor:grabbing; }
  .drag-card.dragging{ opacity:.4; }
  .drag-card:focus-visible{ outline:2px solid var(--moss-deep); outline-offset:2px; }
  .drag-card .rank-badge{
    display:inline-block; background:var(--moss); color:#fff; font-size:.7rem;
    border-radius:999px; padding:1px 8px; margin-right:8px; font-weight:700;
  }
  .drag-hint{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size:.78rem; opacity:.55; margin-top:10px;}

  .timeline-wrap{ margin-top:20px; }
  .timeline-track{
    position:relative; height:90px; border-radius:14px;
    background: linear-gradient(90deg, rgba(107,111,156,.08), rgba(169,118,90,.08));
    border:1.5px solid var(--line); margin-bottom:16px;
  }
  .timeline-axis{
    position:absolute; left:16px; right:16px; top:50%; height:2px;
    background:var(--line); transform:translateY(-50%);
  }
  .timeline-marker{
    position:absolute; top:50%; transform:translate(-50%,-50%);
    width:46px; height:46px; border-radius:50%;
    background:var(--moss); color:#fff; display:flex; align-items:center; justify-content:center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size:.68rem; font-weight:700; cursor:grab; box-shadow: var(--shadow);
    touch-action:none; text-align:center; line-height:1.1; padding:2px;
  }
  .timeline-marker:active{ cursor:grabbing; }
  .timeline-marker:focus-visible{ outline:3px solid var(--dusk); outline-offset:3px; }
  .timeline-labels{
    display:flex; justify-content:space-between;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size:.74rem; opacity:.6; padding:0 8px;
  }
  .timeline-q{ font-size:1rem; margin-bottom:6px; }

  .result-type{ display:flex; align-items:center; gap:16px; margin-bottom:22px; flex-wrap:wrap; }
  .result-badge{
    width:64px; height:64px; border-radius:50%; flex-shrink:0;
    background: linear-gradient(135deg, var(--moss), var(--clay));
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.6rem;
    box-shadow: var(--shadow);
  }
  .bars{ display:grid; gap:12px; margin:22px 0; }
  .bar-row{ display:grid; grid-template-columns: 160px 1fr 46px; gap:10px; align-items:center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size:.85rem;}
  @media (max-width:600px){ .bar-row{ grid-template-columns: 100px 1fr 40px; font-size:.78rem;} }
  .bar-track{ height:10px; border-radius:999px; background:var(--paper-2); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:999px; background: linear-gradient(90deg, var(--moss), var(--dusk)); width:0%; transition: width 1s var(--ease); }
  .insight-list{ display:grid; gap:12px; margin:20px 0; padding:0; list-style:none; }
  .insight-list li{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background:rgba(255,255,255,.5); border:1px solid var(--line); border-radius:12px; padding:14px 16px;
    font-size:.92rem; line-height:1.5;
  }
  .journal-note{ margin-top:22px; }
  .journal-note textarea{
    width:100%; min-height:110px; border-radius:12px; border:1.5px solid var(--line);
    padding:14px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size:.92rem; resize:vertical; background:rgba(255,255,255,.6);
  }
  .journal-note textarea:focus-visible{ outline:2px solid var(--moss-deep); }

  .disclaimer{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size:.74rem; opacity:.55; margin-top:26px; line-height:1.5;
  }
  .live-region{ position:absolute; left:-9999px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.001s !important; }
    .ambient span{ animation:none; }
  }
</style>
</head>
<body data-mode="calm">
<div class="ambient" aria-hidden="true"><span></span><span></span><span></span></div>
<div class="live-region" role="status" aria-live="polite" id="liveRegion"></div>

<div class="app">
  <header class="topbar">
    <div class="brand">Cognitive Pattern Explorer<small>a quiet space to notice how you think</small></div>
    <div class="mode-toggle sans" role="group" aria-label="Choose ambiance">
      <button type="button" id="calmBtn" aria-pressed="true">Calm</button>
      <button type="button" id="stressBtn" aria-pressed="false">Stress</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap" style="display:none;">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-steps sans">
      <span data-step="0">Start</span>
      <span data-step="1">Discover</span>
      <span data-step="2">Priorities</span>
      <span data-step="3">Map</span>
      <span data-step="4">Journal</span>
    </div>
  </div>

  <main class="card" id="mainCard"></main>
</div>

<script>
(function(){
  "use strict";

  var TYPES = {
    analytical: { name:"Analytical Thinker", icon:"\u25C6",
      desc:"You tend to slow down, break things into parts, and look for the logic before acting. This suggests you find comfort in structure and evidence." },
    emotional: { name:"Emotional Intuitive", icon:"\u2748",
      desc:"You often lead with how something feels before you reason it out. This suggests your gut sense is a genuine source of information for you, not a distraction from thinking." },
    overthinking: { name:"Overthinking Loop Style", icon:"\u25CD",
      desc:"You often revisit a decision from many angles, sometimes circling back even after you've chosen. This suggests you care deeply about getting things right, which can occasionally make it harder to land." },
    action: { name:"Action-First Decision Maker", icon:"\u25B2",
      desc:"You tend to move quickly once you have a rough sense of direction, adjusting as you go. This suggests you trust momentum and real-world feedback over prolonged planning." },
    balanced: { name:"Balanced Reflective Thinker", icon:"\u25D0",
      desc:"You tend to blend logic and feeling, pausing briefly but rarely getting stuck. This suggests you've built a flexible rhythm between reflection and action." }
  };

  var SCENARIOS = [
    { id:"s1", prompt:"You're handed a project with an unclear deadline. What's your first move?",
      options:[
        { text:"Map out every possible step before starting.", weight:{analytical:2} },
        { text:"Notice how the project makes you feel about the team.", weight:{emotional:2} },
        { text:"Start drafting immediately and refine later.", weight:{action:2} },
        { text:"Think it through, then jump in once it feels roughly right.", weight:{balanced:2} },
        { text:"Turn it over in your head for days before doing anything.", weight:{overthinking:2} }
      ]},
    { id:"s2", prompt:"A friend asks for advice on a tough choice. How do you respond?",
      options:[
        { text:"List out pros and cons methodically.", weight:{analytical:2} },
        { text:"Ask how they feel about each option first.", weight:{emotional:2} },
        { text:"Tell them to just try one and see what happens.", weight:{action:2} },
        { text:"Offer a balance of practical and emotional angles.", weight:{balanced:2} },
        { text:"Worry with them, replaying every scenario together.", weight:{overthinking:2} }
      ]},
    { id:"s3", prompt:"You make a small mistake at work. What happens next in your mind?",
      options:[
        { text:"You analyze exactly what went wrong, step by step.", weight:{analytical:2} },
        { text:"You feel a wave of emotion before anything else.", weight:{emotional:2} },
        { text:"You fix it and move on within minutes.", weight:{action:2} },
        { text:"You note it, feel briefly uneasy, then let it go.", weight:{balanced:2} },
        { text:"You replay it for the rest of the day.", weight:{overthinking:2} }
      ]},
    { id:"s4", prompt:"Faced with a big life decision, what's most true for you?",
      options:[
        { text:"I build a list to compare options carefully.", weight:{analytical:2} },
        { text:"I trust the option that feels right in my chest.", weight:{emotional:2} },
        { text:"I pick the first reasonable path and adjust later.", weight:{action:2} },
        { text:"I weigh it calmly, then commit without much drama.", weight:{balanced:2} },
        { text:"I keep reopening the decision even after choosing.", weight:{overthinking:2} }
      ]}
  ];

  var PRIORITY_CARDS = [
    { id:"p1", text:"Having a clear plan before I start", map:{analytical:1} },
    { id:"p2", text:"Following my gut feeling", map:{emotional:1} },
    { id:"p3", text:"Getting something moving quickly", map:{action:1} },
    { id:"p4", text:"Considering every possible outcome", map:{overthinking:1} },
    { id:"p5", text:"Staying calm under pressure", map:{balanced:1} },
    { id:"p6", text:"Double-checking my reasoning", map:{analytical:1} }
  ];

  var TIMELINE_QUESTIONS = [
    { id:"t1", q:"When facing a decision, where do you usually start?",
      left:"Instant gut reaction", right:"Long careful deliberation",
      score:function(v){ return v<35 ? {emotional:1,action:0.5} : v>65 ? {overthinking:1,analytical:0.5} : {balanced:1}; } },
    { id:"t2", q:"Once you've decided something, how often do you revisit it?",
      left:"Rarely, I move on", right:"Often, I keep reconsidering",
      score:function(v){ return v<35 ? {action:1,balanced:0.5} : v>65 ? {overthinking:1} : {balanced:0.7,analytical:0.3}; } },
    { id:"t3", q:"How do you weigh logic versus feeling in choices?",
      left:"Mostly logic", right:"Mostly feeling",
      score:function(v){ return v<35 ? {analytical:1} : v>65 ? {emotional:1} : {balanced:1}; } }
  ];

  var state = {
    step: 0,
    mode: "calm",
    scenarioIndex: 0,
    scenarioAnswers: {},
    priorityOrder: [],
    timelineValues: {},
    journalText: ""
  };

  var scores = { analytical:0, emotional:0, overthinking:0, action:0, balanced:0 };

  function addWeights(w){
    if(!w) return;
    for(var k in w){ if(scores.hasOwnProperty(k)) scores[k]+=w[k]; }
  }

  function recomputeScores(){
    scores = { analytical:0, emotional:0, overthinking:0, action:0, balanced:0 };
    SCENARIOS.forEach(function(sc){
      var ans = state.scenarioAnswers[sc.id];
      if(ans) addWeights(ans);
    });
    state.priorityOrder.forEach(function(id, idx){
      var card = PRIORITY_CARDS.filter(function(c){return c.id===id;})[0];
      if(card){
        var rankWeight = (state.priorityOrder.length - idx);
        for(var k in card.map){ scores[k] += card.map[k]*rankWeight*0.5; }
      }
    });
    TIMELINE_QUESTIONS.forEach(function(tq){
      var v = state.timelineValues[tq.id];
      if(typeof v === "number"){ addWeights(tq.score(v)); }
    });
  }

  function topType(){
    var best=null, bestScore=-Infinity;
    for(var k in scores){ if(scores[k]>bestScore){ bestScore=scores[k]; best=k; } }
    return best;
  }

  function percentBreakdown(){
    var total=0;
    for(var k in scores){ total += Math.max(scores[k],0); }
    var out={};
    for(var k2 in scores){ out[k2] = total>0 ? Math.round((Math.max(scores[k2],0)/total)*100) : 0; }
    return out;
  }

  function announce(msg){
    var lr = document.getElementById("liveRegion");
    lr.textContent = "";
    setTimeout(function(){ lr.textContent = msg; }, 30);
  }

  var main = document.getElementById("mainCard");
  var progressWrap = document.getElementById("progressWrap");
  var progressFill = document.getElementById("progressFill");

  function updateProgress(){
    if(state.step === 0){ progressWrap.style.display="none"; return; }
    progressWrap.style.display="block";
    var pct = (state.step/4)*100;
    progressFill.style.width = pct+"%";
    var steps = document.querySelectorAll(".progress-steps span");
    for(var i=0;i<steps.length;i++){
      var s = steps[i];
      if(parseInt(s.dataset.step,10) === state.step) s.classList.add("active");
      else s.classList.remove("active");
    }
  }

  function render(){
    updateProgress();
    main.innerHTML = "";
    main.classList.remove("screen");
    void main.offsetWidth;
    main.classList.add("screen");
    if(state.step===0) renderStart();
    else if(state.step===1) renderChapter1();
    else if(state.step===2) renderChapter2();
    else if(state.step===3) renderChapter3();
    else if(state.step===4) renderJournal();
  }

  function renderStart(){
    var h1 = document.createElement("h1");
    h1.textContent = "Welcome to a quiet exploration of how you think.";
    var p = document.createElement("p");
    p.className="lede";
    p.textContent = "This isn't a test, and there's no right answer. Across three short chapters you'll respond to scenarios, sort some priorities, and map a few instincts on a sliding scale. At the end you'll get a personal reflection \u2014 not a diagnosis, just a mirror.";
    var note = document.createElement("p");
    note.className="lede sans";
    note.style.fontSize=".82rem";
    note.style.marginTop="14px";
    note.textContent = "Educational and reflective only \u2014 this app does not assess or diagnose mental health.";

    var row = document.createElement("div");
    row.className="nav-row";
    var btn = document.createElement("button");
    btn.className="btn"; btn.type="button"; btn.textContent="Begin the exploration \u2192";
    btn.addEventListener("click", function(){ state.step=1; announce("Chapter one: Discover your thinking style."); render(); });
    row.appendChild(btn);

    main.appendChild(h1); main.appendChild(p); main.appendChild(note); main.appendChild(row);
  }

  function renderChapter1(){
    var sc = SCENARIOS[state.scenarioIndex];
    var h2 = document.createElement("h2");
    h2.textContent = "Chapter 1 \u00B7 Discover Your Thinking Style";
    var sub = document.createElement("p");
    sub.className="lede sans";
    sub.style.marginBottom="20px";
    sub.textContent = "Scenario "+(state.scenarioIndex+1)+" of "+SCENARIOS.length;

    var scenarioDiv = document.createElement("div");
    scenarioDiv.className="scenario";
    var promptEl = document.createElement("div");
    promptEl.className="prompt";
    promptEl.textContent = sc.prompt;
    scenarioDiv.appendChild(promptEl);

    var optionsDiv = document.createElement("div");
    optionsDiv.className="options";
    var selected = state.scenarioAnswers[sc.id+"_choice"];
    sc.options.forEach(function(opt, i){
      var b = document.createElement("button");
      b.className="option"; b.type="button";
      b.textContent = opt.text;
      b.setAttribute("aria-pressed", selected===i ? "true":"false");
      b.addEventListener("click", function(){
        state.scenarioAnswers[sc.id] = opt.weight;
        state.scenarioAnswers[sc.id+"_choice"] = i;
        announce("Choice recorded.");
        render();
      });
      optionsDiv.appendChild(b);
    });
    scenarioDiv.appendChild(optionsDiv);

    var row = document.createElement("div");
    row.className="nav-row";
    var back = document.createElement("button");
    back.className="btn ghost"; back.type="button"; back.textContent="\u2190 Back";
    back.addEventListener("click", function(){
      if(state.scenarioIndex>0){ state.scenarioIndex--; render(); }
      else { state.step=0; render(); }
    });
    var next = document.createElement("button");
    next.className="btn"; next.type="button";
    var hasAnswer = state.scenarioAnswers.hasOwnProperty(sc.id);
    next.disabled = !hasAnswer;
    next.textContent = state.scenarioIndex < SCENARIOS.length-1 ? "Next \u2192" : "Continue to Chapter 2 \u2192";
    next.addEventListener("click", function(){
      if(state.scenarioIndex < SCENARIOS.length-1){ state.scenarioIndex++; render(); }
      else { state.step=2; announce("Chapter two: choose your priorities."); render(); }
    });
    row.appendChild(back); row.appendChild(next);

    main.appendChild(h2); main.appendChild(sub); main.appendChild(scenarioDiv); main.appendChild(row);
  }

  function renderChapter2(){
    if(state.priorityOrder.length===0){
      var ids = PRIORITY_CARDS.map(function(c){return c.id;});
      ids.sort(function(){ return Math.random()-0.5; });
      state.priorityOrder = [];
      state._pool = ids;
    }
    if(!state._pool){
      state._pool = PRIORITY_CARDS.map(function(c){return c.id;}).filter(function(id){
        return state.priorityOrder.indexOf(id)===-1;
      });
    }

    var h2 = document.createElement("h2");
    h2.textContent = "Chapter 2 \u00B7 Choose Your Priorities";
    var sub = document.createElement("p");
    sub.className="lede sans";
    sub.style.marginBottom="10px";
    sub.textContent = "Drag the cards into the ranking box, most important on top. On touch devices, press and drag.";

    var layout = document.createElement("div");
    layout.className="dnd-layout";

    var pool = document.createElement("div");
    pool.className="pool"; pool.id="poolZone";
    var poolLabel = document.createElement("div");
    poolLabel.className="zone-label sans"; poolLabel.textContent="Unranked";
    pool.appendChild(poolLabel);

    var drop = document.createElement("div");
    drop.className="dropzone"; drop.id="rankZone";
    var dropLabel = document.createElement("div");
    dropLabel.className="zone-label sans"; dropLabel.textContent="Your ranking (top = most important)";
    drop.appendChild(dropLabel);

    layout.appendChild(pool); layout.appendChild(drop);

    var hint = document.createElement("div");
    hint.className="drag-hint";
    hint.textContent = "Tip: keyboard users can focus a card and press Enter to move it, arrow keys to reorder within the ranking.";

    var row = document.createElement("div");
    row.className="nav-row";
    var back = document.createElement("button");
    back.className="btn ghost"; back.type="button"; back.textContent="\u2190 Back";
    back.addEventListener("click", function(){ state.step=1; render(); });
    var next = document.createElement("button");
    next.className="btn"; next.type="button"; next.id="ch2NextBtn"; next.textContent="Continue to Chapter 3 \u2192";
    next.addEventListener("click", function(){ state.step=3; announce("Chapter three: map your thinking."); render(); });
    row.appendChild(back); row.appendChild(next);

    main.appendChild(h2); main.appendChild(sub); main.appendChild(layout); main.appendChild(hint); main.appendChild(row);

    buildDragCards(pool, drop);
  }

  function buildDragCards(poolEl, dropEl){
    var draggedId = null;

    function cardEl(id, rankIndex){
      var card = PRIORITY_CARDS.filter(function(c){return c.id===id;})[0];
      var el = document.createElement("div");
      el.className="drag-card";
      el.draggable = true;
      el.tabIndex = 0;
      el.dataset.id = id;
      el.setAttribute("role","listitem");
      var label = "";
      if(typeof rankIndex === "number"){ label = '<span class="rank-badge">'+(rankIndex+1)+'</span>'; }
      el.innerHTML = label + card.text;
      el.setAttribute("aria-label", card.text + (typeof rankIndex==="number" ? (", ranked "+(rankIndex+1)) : ", unranked, press Enter to add to ranking"));

      el.addEventListener("dragstart", function(e){
        draggedId = id; el.classList.add("dragging");
        e.dataTransfer.effectAllowed="move";
        e.dataTransfer.setData("text/plain", id);
      });
      el.addEventListener("dragend", function(){ el.classList.remove("dragging"); draggedId=null; });

      var pointerDragging=false;
      el.addEventListener("pointerdown", function(e){
        if(e.pointerType==="mouse") return;
        pointerDragging=true;
        el.setPointerCapture(e.pointerId);
      });
      el.addEventListener("pointermove", function(e){
        if(!pointerDragging) return;
        var target = document.elementFromPoint(e.clientX, e.clientY);
        var zone = target ? target.closest(".pool,.dropzone") : null;
        var zones = document.querySelectorAll(".dropzone");
        for(var i=0;i<zones.length;i++){ zones[i].classList.remove("dragover"); }
        if(zone && zone.classList.contains("dropzone")) zone.classList.add("dragover");
      });
      el.addEventListener("pointerup", function(e){
        if(!pointerDragging) return;
        pointerDragging=false;
        var target = document.elementFromPoint(e.clientX, e.clientY);
        var zone = target ? target.closest(".pool,.dropzone") : null;
        var zones = document.querySelectorAll(".dropzone");
        for(var i=0;i<zones.length;i++){ zones[i].classList.remove("dragover"); }
        if(zone){ moveCard(id, zone.classList.contains("dropzone")); }
      });

      el.addEventListener("keydown", function(e){
        var inRank = state.priorityOrder.indexOf(id) !== -1;
        if(e.key==="Enter" || e.key===" "){
          e.preventDefault();
          moveCard(id, !inRank);
        } else if(inRank && (e.key==="ArrowUp" || e.key==="ArrowLeft")){
          e.preventDefault();
          reorder(id, -1);
        } else if(inRank && (e.key==="ArrowDown" || e.key==="ArrowRight")){
          e.preventDefault();
          reorder(id, 1);
        }
      });

      return el;
    }

    function reorder(id, dir){
      var idx = state.priorityOrder.indexOf(id);
      var newIdx = idx+dir;
      if(newIdx<0 || newIdx>=state.priorityOrder.length) return;
      state.priorityOrder.splice(idx,1);
      state.priorityOrder.splice(newIdx,0,id);
      refresh();
      var el = poolEl.parentElement.querySelector('[data-id="'+id+'"]');
      if(el) el.focus();
      announce("Reordered.");
    }

    function moveCard(id, intoRank){
      var rankIdx = state.priorityOrder.indexOf(id);
      if(intoRank && rankIdx===-1){
        state.priorityOrder.push(id);
        state._pool = state._pool.filter(function(pid){return pid!==id;});
        announce("Added to ranking.");
      } else if(!intoRank && rankIdx!==-1){
        state.priorityOrder.splice(rankIdx,1);
        if(state._pool.indexOf(id)===-1) state._pool.push(id);
        announce("Moved back to unranked.");
      }
      refresh();
      var el = poolEl.parentElement.querySelector('[data-id="'+id+'"]');
      if(el) el.focus();
    }

    function refresh(){
      var poolCards = poolEl.querySelectorAll(".drag-card");
      var dropCards = dropEl.querySelectorAll(".drag-card");
      for(var i=0;i<poolCards.length;i++){ poolCards[i].remove(); }
      for(var j=0;j<dropCards.length;j++){ dropCards[j].remove(); }
      state._pool.forEach(function(id){ poolEl.appendChild(cardEl(id)); });
      state.priorityOrder.forEach(function(id, idx){ dropEl.appendChild(cardEl(id, idx)); });
      var nextBtn = document.getElementById("ch2NextBtn");
      if(nextBtn) nextBtn.disabled = false;
    }

    [poolEl, dropEl].forEach(function(zone){
      zone.addEventListener("dragover", function(e){ e.preventDefault(); zone.classList.add("dragover"); });
      zone.addEventListener("dragleave", function(){ zone.classList.remove("dragover"); });
      zone.addEventListener("drop", function(e){
        e.preventDefault(); zone.classList.remove("dragover");
        var id = e.dataTransfer.getData("text/plain") || draggedId;
        if(!id) return;
        moveCard(id, zone===dropEl);
      });
    });

    refresh();
  }

  function renderChapter3(){
    var h2 = document.createElement("h2");
    h2.textContent = "Chapter 3 \u00B7 Map Your Thinking";
    var sub = document.createElement("p");
    sub.className="lede sans";
    sub.style.marginBottom="10px";
    sub.textContent = "Drag each marker along its line to where it feels true for you. Use arrow keys when a marker is focused.";

    var wrap = document.createElement("div");
    wrap.className="timeline-wrap";

    TIMELINE_QUESTIONS.forEach(function(tq){
      if(typeof state.timelineValues[tq.id] !== "number") state.timelineValues[tq.id]=50;

      var qEl = document.createElement("div");
      qEl.className="timeline-q";
      qEl.textContent = tq.q;

      var track = document.createElement("div");
      track.className="timeline-track";
      var axis = document.createElement("div"); axis.className="timeline-axis";
      var marker = document.createElement("div");
      marker.className="timeline-marker";
      marker.tabIndex=0;
      marker.setAttribute("role","slider");
      marker.setAttribute("aria-valuemin","0");
      marker.setAttribute("aria-valuemax","100");
      marker.setAttribute("aria-valuenow", String(Math.round(state.timelineValues[tq.id])));
      marker.setAttribute("aria-label", tq.q);
      marker.textContent = Math.round(state.timelineValues[tq.id])+"%";
      track.appendChild(axis); track.appendChild(marker);

      var labels = document.createElement("div");
      labels.className="timeline-labels sans";
      var l1=document.createElement("span"); l1.textContent=tq.left;
      var l2=document.createElement("span"); l2.textContent=tq.right;
      labels.appendChild(l1); labels.appendChild(l2);

      wrap.appendChild(qEl); wrap.appendChild(track); wrap.appendChild(labels);

      function positionMarker(){
        var rect = track.getBoundingClientRect();
        var usable = rect.width - 32;
        var pctv = state.timelineValues[tq.id];
        var x = 16 + (usable * (pctv/100));
        marker.style.left = x+"px";
        marker.textContent = Math.round(pctv)+"%";
        marker.setAttribute("aria-valuenow", String(Math.round(pctv)));
      }

      function setFromClientX(clientX){
        var rect = track.getBoundingClientRect();
        var usable = rect.width - 32;
        var raw = ((clientX - rect.left - 16) / usable) * 100;
        raw = Math.max(0, Math.min(100, raw));
        state.timelineValues[tq.id] = raw;
        positionMarker();
      }

      var dragging=false;
      marker.addEventListener("pointerdown", function(e){ dragging=true; marker.setPointerCapture(e.pointerId); });
      marker.addEventListener("pointermove", function(e){ if(dragging) setFromClientX(e.clientX); });
      marker.addEventListener("pointerup", function(){ dragging=false; });
      marker.addEventListener("keydown", function(e){
        var step=5;
        if(e.key==="ArrowLeft"||e.key==="ArrowDown"){
          e.preventDefault();
          state.timelineValues[tq.id] = Math.max(0, state.timelineValues[tq.id]-step);
          positionMarker();
        } else if(e.key==="ArrowRight"||e.key==="ArrowUp"){
          e.preventDefault();
          state.timelineValues[tq.id] = Math.min(100, state.timelineValues[tq.id]+step);
          positionMarker();
        }
      });

      window.addEventListener("resize", positionMarker);
      setTimeout(positionMarker, 0);
    });

    var row = document.createElement("div");
    row.className="nav-row";
    var back = document.createElement("button");
    back.className="btn ghost"; back.type="button"; back.textContent="\u2190 Back";
    back.addEventListener("click", function(){ state.step=2; render(); });
    var next = document.createElement("button");
    next.className="btn"; next.type="button"; next.textContent="Reveal my reflection \u2192";
    next.addEventListener("click", function(){
      recomputeScores();
      state.step=4;
      announce("Your reflection journal is ready.");
      render();
    });
    row.appendChild(back); row.appendChild(next);

    main.appendChild(h2); main.appendChild(sub); main.appendChild(wrap); main.appendChild(row);
  }

  function renderJournal(){
    recomputeScores();
    var top = topType();
    var typeInfo = TYPES[top];
    var pct = percentBreakdown();

    var h2 = document.createElement("h2");
    h2.textContent = "Your Reflection Journal";

    var typeRow = document.createElement("div");
    typeRow.className="result-type";
    var badge = document.createElement("div");
    badge.className="result-badge";
    badge.textContent = typeInfo.icon;
    var typeText = document.createElement("div");
    var tName = document.createElement("div");
    tName.style.fontSize="1.25rem"; tName.style.fontWeight="700";
    tName.textContent = typeInfo.name;
    var tDesc = document.createElement("p");
    tDesc.className="lede sans"; tDesc.style.margin="4px 0 0";
    tDesc.textContent = typeInfo.desc;
    typeText.appendChild(tName); typeText.appendChild(tDesc);
    typeRow.appendChild(badge); typeRow.appendChild(typeText);

    var barsLabel = document.createElement("p");
    barsLabel.className="lede sans";
    barsLabel.style.fontWeight="600"; barsLabel.style.opacity="0.85";
    barsLabel.textContent = "Your pattern breakdown:";

    var bars = document.createElement("div");
    bars.className="bars";
    Object.keys(TYPES).forEach(function(key){
      var row = document.createElement("div");
      row.className="bar-row";
      var label = document.createElement("div"); label.textContent = TYPES[key].name;
      var track = document.createElement("div"); track.className="bar-track";
      var fill = document.createElement("div"); fill.className="bar-fill";
      track.appendChild(fill);
      var val = document.createElement("div"); val.textContent = pct[key]+"%";
      row.appendChild(label); row.appendChild(track); row.appendChild(val);
      bars.appendChild(row);
      setTimeout(function(f, p){ return function(){ f.style.width = p+"%"; }; }(fill, pct[key]), 60);
    });

    var insightsLabel = document.createElement("p");
    insightsLabel.className="lede sans";
    insightsLabel.style.fontWeight="600"; insightsLabel.style.opacity="0.85";
    insightsLabel.style.marginTop="18px";
    insightsLabel.textContent = "A few gentle observations:";

    var insights = buildInsights(pct, top);
    var ul = document.createElement("ul");
    ul.className="insight-list";
    insights.forEach(function(text){
      var li = document.createElement("li"); li.textContent = text; ul.appendChild(li);
    });

    var journalNote = document.createElement("div");
    journalNote.className="journal-note";
    var jLabel = document.createElement("label");
    jLabel.className="lede sans"; jLabel.style.fontWeight="600"; jLabel.style.display="block"; jLabel.style.marginBottom="8px";
    jLabel.setAttribute("for","journalTextarea");
    jLabel.textContent = "Want to jot down a reflection of your own?";
    var ta = document.createElement("textarea");
    ta.id="journalTextarea";
    ta.placeholder="What surprised you about your results, if anything?";
    ta.value = state.journalText;
    ta.addEventListener("input", function(){ state.journalText = ta.value; });
    journalNote.appendChild(jLabel); journalNote.appendChild(ta);

    var row = document.createElement("div");
    row.className="nav-row";
    var restart = document.createElement("button");
    restart.className="btn ghost"; restart.type="button"; restart.textContent="\u21BA Start over";
    restart.addEventListener("click", function(){
      state = { step:0, mode:state.mode, scenarioIndex:0, scenarioAnswers:{}, priorityOrder:[], timelineValues:{}, journalText:"" };
      announce("Starting over.");
      render();
    });
    var back = document.createElement("button");
    back.className="btn ghost"; back.type="button"; back.textContent="\u2190 Back to map";
    back.addEventListener("click", function(){ state.step=3; render(); });
    row.appendChild(back); row.appendChild(restart);

    var disclaimer = document.createElement("p");
    disclaimer.className="disclaimer";
    disclaimer.textContent = "This reflection is for self-exploration and educational purposes only. It is not a psychological assessment, diagnosis, or substitute for professional guidance.";

    main.appendChild(h2); main.appendChild(typeRow); main.appendChild(barsLabel);
    main.appendChild(bars); main.appendChild(insightsLabel); main.appendChild(ul);
    main.appendChild(journalNote); main.appendChild(row); main.appendChild(disclaimer);
  }

  function buildInsights(pct, top){
    var out = [];
    out.push("Your strongest pattern today leans toward "+TYPES[top].name+", at roughly "+pct[top]+"% of your responses.");
    if(pct.overthinking >= 25){
      out.push("There's a noticeable overthinking thread in your answers \u2014 this often shows up when something matters a lot to you.");
    }
    if(pct.action >= 30 && pct.overthinking < 20){
      out.push("You lean toward quick decisive movement, which suggests you're comfortable adjusting course as new information arrives.");
    }
    if(pct.balanced >= 25){
      out.push("A meaningful part of your pattern is balance itself \u2014 you often let logic and feeling take turns rather than picking one permanently.");
    }
    if(pct.analytical >= 25 && pct.emotional >= 25){
      out.push("Interestingly, both analytical and emotional tendencies show up strongly \u2014 this suggests your thinking style may shift depending on context.");
    }
    out.push("Remember: these patterns are tendencies, not fixed traits, and they can shift day to day, scenario to scenario.");
    return out;
  }

  var calmBtn = document.getElementById("calmBtn");
  var stressBtn = document.getElementById("stressBtn");
  function setMode(mode){
    state.mode = mode;
    document.body.setAttribute("data-mode", mode);
    calmBtn.setAttribute("aria-pressed", mode==="calm" ? "true":"false");
    stressBtn.setAttribute("aria-pressed", mode==="stress" ? "true":"false");
  }
  calmBtn.addEventListener("click", function(){ setMode("calm"); });
  stressBtn.addEventListener("click", function(){ setMode("stress"); });

  render();
})();
</script>
