<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Compass — Software Development Company</title>
<style>
:root{
  --bg-0:#0a0e17;
  --bg-1:#0f1524;
  --glass:rgba(255,255,255,0.05);
  --glass-brd:rgba(255,255,255,0.09);
  --text-hi:#eef1f8;
  --text-lo:#8b93a7;
  --accent-frontend:#5ec8f8;
  --accent-backend:#7c6ff0;
  --accent-qa:#f0a35e;
  --accent-pm:#f06f9c;
  --accent-ux:#5ef0c2;
  --accent-support:#f0e35e;
  --accent-eng:#f05e5e;
  --accent-devops:#5ef08b;
  --good:#5ef0c2;
  --warn:#f0a35e;
  --radius:18px;
  font-size:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(circle at 15% 10%, rgba(124,111,240,0.16), transparent 45%),
    radial-gradient(circle at 85% 30%, rgba(94,200,248,0.12), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(94,240,194,0.10), transparent 45%),
    linear-gradient(160deg, var(--bg-0), var(--bg-1));
  background-attachment:fixed;
  color:var(--text-hi);
  min-height:100vh;
  overflow-x:hidden;
}
.app{max-width:920px;margin:0 auto;padding:28px 18px 80px;}
.header{text-align:center;margin-bottom:22px;}
.logo{
  font-size:2rem;font-weight:800;letter-spacing:-0.02em;
  background:linear-gradient(90deg,#7c6ff0,#5ec8f8,#5ef0c2);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  display:inline-flex;align-items:center;gap:10px;
}
.subtitle{color:var(--text-lo);font-size:0.95rem;margin-top:4px;}
.progress-wrap{margin:20px auto 0;max-width:640px;}
.progress-stages{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-lo);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.progress-stages span.active{color:var(--text-hi);font-weight:700;}
.progress-bar{height:6px;border-radius:6px;background:var(--glass);overflow:hidden;border:1px solid var(--glass-brd);}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#7c6ff0,#5ec8f8,#5ef0c2);transition:width .5s cubic-bezier(.4,0,.2,1);}

.card{
  background:var(--glass);
  border:1px solid var(--glass-brd);
  border-radius:var(--radius);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:26px;
  margin-top:22px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  animation:fadein .5s ease both;
}
@keyframes fadein{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.ticket{
  background:linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  border:1px solid var(--glass-brd);
  border-left:4px solid var(--accent-backend);
  border-radius:12px;
  padding:18px 20px;
  margin-bottom:20px;
  position:relative;
}
.ticket .tag{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-lo);font-weight:700;}
.ticket .title{font-size:1.15rem;font-weight:700;margin-top:6px;line-height:1.4;}
.ticket .meta{margin-top:10px;font-size:0.78rem;color:var(--text-lo);}

.stage-label{font-size:0.78rem;color:var(--accent-frontend);font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;}
.stage-title{font-size:1.3rem;font-weight:800;margin-bottom:14px;}
.stage-desc{color:var(--text-lo);font-size:0.9rem;margin-bottom:18px;line-height:1.5;}

.dropzone{
  min-height:64px;
  border:2px dashed rgba(255,255,255,0.18);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-lo);
  font-size:0.85rem;
  margin:14px 0;
  transition:all .25s ease;
  flex-wrap:wrap;gap:10px;padding:10px;
}
.dropzone.dragover{border-color:var(--accent-frontend);background:rgba(94,200,248,0.08);transform:scale(1.01);}
.dropzone.filled{border-style:solid;border-color:var(--good);}

.role-pool{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;}
.role-card{
  padding:10px 16px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--role-color, var(--accent-backend));
  color:var(--text-hi);
  font-size:0.85rem;font-weight:600;
  cursor:grab;
  display:flex;align-items:center;gap:8px;
  transition:transform .18s ease, box-shadow .18s ease;
  user-select:none;
}
.role-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,0.3);}
.role-card:active{cursor:grabbing;}
.role-card.dragging{opacity:0.4;}
.role-card .dot{width:9px;height:9px;border-radius:50%;background:var(--role-color, var(--accent-backend));flex:none;}
.role-card.placed{opacity:0.35;pointer-events:none;}

.route-slots{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:16px 0;}
.route-slot{
  min-width:120px;min-height:52px;
  border:2px dashed rgba(255,255,255,0.18);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:0.72rem;color:var(--text-lo);padding:6px;
  transition:all .2s ease;
}
.route-slot.filled{border-style:solid;border-color:var(--good);}
.route-arrow{color:var(--text-lo);font-size:1.1rem;}

.multi-select-grid{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0;}
.role-card.selected{border-color:var(--good);background:rgba(94,240,194,0.14);box-shadow:0 0 0 2px rgba(94,240,194,0.25) inset;}
.role-card.selectable{cursor:pointer;}

.btn{
  border:none;border-radius:12px;padding:12px 22px;font-weight:700;font-size:0.88rem;
  cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;
  background:linear-gradient(90deg,#7c6ff0,#5ec8f8);color:#0a0e17;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,111,240,0.35);}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{background:transparent;border:1px solid var(--glass-brd);color:var(--text-hi);}
.btn-row{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}

.feedback{
  margin-top:18px;padding:18px 20px;border-radius:14px;
  background:rgba(94,240,194,0.07);border:1px solid rgba(94,240,194,0.25);
  animation:fadein .4s ease both;
}
.feedback h4{font-size:0.95rem;margin-bottom:6px;color:var(--good);}
.feedback p{font-size:0.85rem;color:var(--text-hi);line-height:1.55;margin-bottom:10px;}
.feedback .assist{font-size:0.8rem;color:var(--text-lo);}
.assist b{color:var(--text-hi);}

.flow-anim{display:flex;align-items:center;gap:6px;margin:16px 0;flex-wrap:wrap;}
.flow-node{
  padding:8px 14px;border-radius:10px;font-size:0.75rem;font-weight:700;
  background:rgba(255,255,255,0.06);border:1px solid var(--glass-brd);
  opacity:0;transform:translateX(-10px);
  animation:slidein .4s ease forwards;
}
@keyframes slidein{to{opacity:1;transform:translateX(0);}}
.flow-arrow{color:var(--text-lo);opacity:0;animation:slidein .4s ease forwards;}

.collab-summary{display:grid;gap:10px;margin-top:14px;}
.collab-row{display:flex;gap:10px;font-size:0.85rem;}
.collab-row .label{color:var(--text-lo);min-width:130px;font-weight:700;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;padding-top:2px;}

.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
@media (max-width:600px){.results-grid{grid-template-columns:1fr;}}
.stat-card{background:var(--glass);border:1px solid var(--glass-brd);border-radius:14px;padding:16px;}
.stat-card .label{font-size:0.72rem;text-transform:uppercase;color:var(--text-lo);letter-spacing:0.06em;margin-bottom:8px;}
.bar-bg{height:10px;border-radius:6px;background:rgba(255,255,255,0.07);overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width 1s cubic-bezier(.4,0,.2,1);}
.stat-card .val{font-size:1.4rem;font-weight:800;margin-top:8px;}

.reflection-list{margin-top:14px;display:grid;gap:14px;}
.reflection-item{padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.04);border-left:3px solid var(--accent-frontend);}
.reflection-item h5{font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent-frontend);margin-bottom:6px;}
.reflection-item p{font-size:0.87rem;color:var(--text-hi);line-height:1.55;}

.celebrate{text-align:center;padding:30px 10px 10px;}
.celebrate .emoji{font-size:2.6rem;animation:pop .6s ease;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}

.confetti{position:fixed;top:-10px;width:8px;height:14px;border-radius:2px;pointer-events:none;animation:fall linear forwards;z-index:999;}
@keyframes fall{to{transform:translateY(105vh) rotate(400deg);opacity:0.3;}}

.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
@media (max-width:560px){.choice-grid{grid-template-columns:1fr;}}
.choice-card{
  background:var(--glass);border:1px solid var(--glass-brd);border-radius:14px;
  padding:16px;cursor:pointer;transition:all .2s ease;text-align:left;
}
.choice-card:hover{transform:translateY(-3px);border-color:var(--accent-frontend);box-shadow:0 8px 22px rgba(94,200,248,0.15);}
.choice-card .ico{font-size:1.4rem;}
.choice-card .name{font-weight:700;margin-top:6px;font-size:0.92rem;}

.intro-actions{text-align:center;margin-top:26px;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ============ DATA ============ */
const ROLES = [
  {id:'fe', name:'Frontend Developer', color:'var(--accent-frontend)', emoji:'🎨'},
  {id:'be', name:'Backend Developer', color:'var(--accent-backend)', emoji:'⚙️'},
  {id:'qa', name:'QA Engineer', color:'var(--accent-qa)', emoji:'🔍'},
  {id:'pm', name:'Product Manager', color:'var(--accent-pm)', emoji:'📋'},
  {id:'ux', name:'UX Designer', color:'var(--accent-ux)', emoji:'✏️'},
  {id:'support', name:'Customer Support', color:'var(--accent-support)', emoji:'🎧'},
  {id:'eng', name:'Engineering Manager', color:'var(--accent-eng)', emoji:'🧭'},
  {id:'devops', name:'DevOps Engineer', color:'var(--accent-devops)', emoji:'🚀'},
];
const roleById = id => ROLES.find(r=>r.id===id);

const STAGE1_TASKS = [
  {title:"A customer reports that payments fail only on iPhones.", owner:'fe', why:"This is a client-side rendering/behavior issue tied to a specific platform, which points to the Frontend Developer who owns how the app behaves across devices.", assist:['qa','be'], assistWhy:"QA reproduces the bug across devices, and Backend confirms whether the payment API itself is healthy."},
  {title:"The API response time has doubled after last night's deploy.", owner:'be', why:"Server-side response time is owned by whoever built and maintains the API layer — the Backend Developer.", assist:['devops','eng'], assistWhy:"DevOps checks infrastructure and deploy logs, while the Engineering Manager helps prioritize a fix."},
  {title:"Users say the new checkout flow is confusing.", owner:'ux', why:"Confusion about a flow is a usability problem, which is the UX Designer's core responsibility.", assist:['pm','fe'], assistWhy:"Product Manager weighs the business impact and Frontend implements any redesign."},
  {title:"A critical bug was found right before the release deadline.", owner:'qa', why:"Catching and verifying bugs before release is exactly what QA Engineers own — they decide if it's release-blocking.", assist:['eng','be'], assistWhy:"Engineering Manager decides whether to delay release, Backend/Frontend (whoever owns the code) fixes it."},
  {title:"A key client wants a custom integration added to the roadmap.", owner:'pm', why:"Deciding what goes on the roadmap and negotiating scope with clients is core Product Manager territory.", assist:['eng','support'], assistWhy:"Engineering Manager assesses feasibility and effort, Support relays the original client context."},
  {title:"The production server crashed at 2am.", owner:'devops', why:"Infrastructure uptime and incident response belong to DevOps, who own deployment and server health.", assist:['be','eng'], assistWhy:"Backend helps diagnose app-level causes, and the Engineering Manager coordinates the incident response."},
  {title:"A user can't figure out how to reset their password and emails support.", owner:'support', why:"Support owns direct user communication and is the first point of contact for account issues.", assist:['fe','be'], assistWhy:"If it's a real bug, Support escalates to Frontend or Backend depending on where the flow breaks."},
  {title:"Team velocity has been dropping for three sprints in a row.", owner:'eng', why:"Team performance and process health are the Engineering Manager's responsibility to diagnose and address.", assist:['pm','qa'], assistWhy:"Product Manager reviews scope creep, QA flags if rework from bugs is eating into velocity."},
  {title:"A new hire doesn't understand the codebase's architecture.", owner:'eng', why:"Onboarding and mentorship on codebase structure typically sits with the Engineering Manager or a senior lead they designate.", assist:['be','fe'], assistWhy:"Backend and Frontend developers pair with the new hire on the specific parts of the codebase they'll touch."},
  {title:"A security scan flags an outdated dependency in production.", owner:'devops', why:"Dependency and infrastructure security patching in production is owned by DevOps.", assist:['be','eng'], assistWhy:"Backend verifies the patch doesn't break functionality; Engineering Manager prioritizes the fix timeline."},
];

const STAGE2_TASKS = [
  {title:"A user reports a bug through the app's help widget.", order:['support','qa','be','fe','support'], why:"Support logs the report first, QA reproduces and confirms it's real, the right developer (Backend here) fixes it, Frontend adjusts the UI if needed, then Support closes the loop with the customer."},
  {title:"A client requests a brand-new feature.", order:['pm','ux','eng','be'], why:"Product Manager scopes the request, UX designs the experience, the Engineering Manager assigns and plans the work, then Backend builds it."},
  {title:"A performance issue is discovered in the checkout API.", order:['be','devops','qa'], why:"Backend investigates and writes a fix, DevOps deploys it safely, and QA verifies performance improved before it's considered done."},
];

const STAGE3_TASKS = [
  {title:"Customer satisfaction suddenly drops.", primary:'support', supporting:['pm','ux','qa'], why:"Support notices the pattern first since they talk to unhappy customers directly. Product Manager investigates root cause, UX checks if a recent change hurt usability, and QA rules out bugs.", flow:"Support → Product Manager → UX / QA → back to Support with a resolution plan for customers."},
  {title:"Sales increase dramatically overnight.", primary:'devops', supporting:['be','pm','eng'], why:"DevOps must ensure infrastructure can handle the new load. Backend watches for performance bottlenecks, Product Manager tracks what's driving the spike, and the Engineering Manager coordinates the response.", flow:"DevOps monitors load → Backend optimizes hot paths → PM + Engineering Manager align on next steps."},
  {title:"Negative reviews appear online about a recent update.", primary:'pm', supporting:['ux','support','eng'], why:"Product Manager owns understanding why users are unhappy with a shipped decision. UX evaluates if the update hurt usability, Support gathers direct user feedback, and Engineering Manager plans any rollback or fix.", flow:"Support collects feedback → PM diagnoses → UX/Engineering propose fixes → PM communicates externally."},
  {title:"A major feature is delayed close to launch.", primary:'eng', supporting:['pm','qa','be'], why:"The Engineering Manager owns delivery timelines and must decide how to respond. Product Manager reassesses scope, QA reports on what's actually broken, and Backend estimates real remaining effort.", flow:"Engineering Manager convenes → QA + Backend report status → PM decides on scope cuts or new timeline."},
];

/* ============ STATE ============ */
const state = {
  screen: 'intro',
  workplace: 'Software Development Company',
  stage: 1,
  q: 0, // question index within stage
  scores: {ownership:0, delegation:0, collaboration:0, workflow:0},
  maxScores: {ownership:0, delegation:0, collaboration:0, workflow:0},
  reflectionNotes: {overAssign:0, underCollab:0, goodOwnership:0},
  s1: shuffle(STAGE1_TASKS).slice(0,3),
  s2: shuffle(STAGE2_TASKS).slice(0,3),
  s3: shuffle(STAGE3_TASKS).slice(0,3),
  answered: false,
};

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

/* ============ RENDER ROOT ============ */
const app = document.getElementById('app');
function render(){ 
  if(state.screen==='intro') return renderIntro();
  if(state.screen==='stage1') return renderStage1();
  if(state.screen==='stage2') return renderStage2();
  if(state.screen==='stage3') return renderStage3();
  if(state.screen==='results') return renderResults();
}

/* ============ HEADER / PROGRESS ============ */
function progressHTML(){
  const totalQ = 9;
  const doneQ = (state.stage-1)*3 + state.q + (state.answered?1:0);
  const pct = Math.min(100, Math.round((doneQ/totalQ)*100));
  const stages = ['Ownership','Routing','Collaboration'];
  return `
  <div class="progress-wrap">
    <div class="progress-stages">
      ${stages.map((s,i)=>`<span class="${state.stage===i+1?'active':''}">${i+1}. ${s}</span>`).join('')}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}
function headerHTML(){
  return `
  <div class="header">
    <div class="logo">🧭 Task Compass</div>
    <div class="subtitle">Learn how work flows through real organizations — ${state.workplace}</div>
    ${state.screen!=='intro' && state.screen!=='results' ? progressHTML() : ''}
  </div>`;
}

/* ============ INTRO ============ */
function renderIntro(){
  app.innerHTML = `
    ${headerHTML()}
    <div class="card">
      <div class="stage-title">Welcome to the simulation 👋</div>
      <p class="stage-desc">You're stepping into a Software Development Company. Across three stages you'll decide who owns tasks, how work should flow between roles, and how teams collaborate on bigger problems. There's no single "correct" score — you'll get a reflection on how you think, not just what you picked.</p>
      <div class="intro-actions">
        <button class="btn" onclick="startGame()">Start Stage 1 →</button>
      </div>
    </div>
  `;
}
function startGame(){ state.screen='stage1'; state.stage=1; state.q=0; state.answered=false; render(); }

/* ============ DRAG HELPERS ============ */
let dragRoleId = null;
function onRoleDragStart(e, id){
  dragRoleId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.setData('text/plain', id);
}
function onRoleDragEnd(e){ e.target.classList.remove('dragging'); }

/* ============ STAGE 1 : OWNERSHIP ============ */
function renderStage1(){
  const task = state.s1[state.q];
  app.innerHTML = `
    ${headerHTML()}
    <div class="card">
      <div class="stage-label">Stage 1 · Question ${state.q+1} of 3</div>
      <div class="stage-title">Who Owns This?</div>
      <div class="stage-desc">Drag the role card that should be the <b>primary owner</b> of this task into the slot below.</div>
      <div class="ticket" style="border-left-color:${roleById(task.owner).color}">
        <div class="tag">🎫 Incoming Ticket</div>
        <div class="title">${task.title}</div>
      </div>
      <div id="dropzone1" class="dropzone" ondragover="event.preventDefault(); this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="onDropOwner(event)">
        Drop the owning role here
      </div>
      <div class="role-pool" id="rolePool1">
        ${ROLES.map(r=>`
          <div class="role-card" draggable="true" data-id="${r.id}" style="--role-color:${r.color}"
            ondragstart="onRoleDragStart(event,'${r.id}')" ondragend="onRoleDragEnd(event)">
            <span class="dot"></span>${r.emoji} ${r.name}
          </div>`).join('')}
      </div>
      <div id="feedback1"></div>
      <div class="btn-row" id="s1actions"></div>
    </div>
  `;
}
function onDropOwner(e){
  e.preventDefault();
  const zone = e.currentTarget;
  zone.classList.remove('dragover');
  if(state.answered) return;
  const id = e.dataTransfer.getData('text/plain');
  const role = roleById(id);
  zone.classList.add('filled');
  zone.innerHTML = `<div class="role-card" style="--role-color:${role.color}"><span class="dot"></span>${role.emoji} ${role.name}</div>`;
  zone.dataset.picked = id;
  document.getElementById('s1actions').innerHTML = `<button class="btn" onclick="submitOwner()">Submit</button>`;
}
function submitOwner(){
  if(state.answered) return;
  state.answered = true;
  const task = state.s1[state.q];
  const zone = document.getElementById('dropzone1');
  const picked = zone.dataset.picked;
  const correct = picked === task.owner;
  const ownerRole = roleById(task.owner);

  // scoring
  state.maxScores.ownership += 1;
  if(correct){ state.scores.ownership += 1; state.reflectionNotes.goodOwnership++; }
  else{ state.reflectionNotes.overAssign += (picked==='eng'||picked==='pm')?1:0; }

  document.querySelectorAll('#rolePool1 .role-card').forEach(c=>c.classList.add('placed'));

  document.getElementById('feedback1').innerHTML = `
    <div class="feedback">
      <h4>${correct? '✓ Primary Owner: ' : '↳ Primary Owner: '}${ownerRole.emoji} ${ownerRole.name}</h4>
      <p>${task.why}</p>
      <div class="assist"><b>May assist:</b> ${task.assist.map(id=>roleById(id).name).join(', ')} — ${task.assistWhy}</div>
    </div>
  `;
  document.getElementById('s1actions').innerHTML = `<button class="btn" onclick="nextStage1()">${state.q<2?'Next task →':'Continue to Stage 2 →'}</button>`;
}
function nextStage1(){
  state.q++;
  state.answered = false;
  if(state.q>=3){ state.screen='stage2'; state.stage=2; state.q=0; }
  render();
}

/* ============ STAGE 2 : ROUTING ============ */
function renderStage2(){
  const task = state.s2[state.q];
  const n = task.order.length;
  const pool = shuffle([...task.order]);
  app.innerHTML = `
    ${headerHTML()}
    <div class="card">
      <div class="stage-label">Stage 2 · Question ${state.q+1} of 3</div>
      <div class="stage-title">Task Routing</div>
      <div class="stage-desc">Build the workflow: drag roles into the slots in the order the task should travel through the organization. This route needs <b>${n} steps</b>.</div>
      <div class="ticket" style="border-left-color:var(--accent-pm)">
        <div class="tag">🎫 Incoming Ticket</div>
        <div class="title">${task.title}</div>
      </div>
      <div class="route-slots" id="routeSlots">
        ${task.order.map((_,i)=>`<div class="route-slot" data-idx="${i}" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="onDropRoute(event,${i})">Step ${i+1}</div>${i<n-1?'<span class="route-arrow">→</span>':''}`).join('')}
      </div>
      <div class="role-pool" id="rolePool2">
        ${pool.map(id=>{const r=roleById(id); return `
          <div class="role-card" draggable="true" data-id="${r.id}" style="--role-color:${r.color}"
            ondragstart="onRoleDragStart(event,'${r.id}')" ondragend="onRoleDragEnd(event)">
            <span class="dot"></span>${r.emoji} ${r.name}
          </div>`;}).join('')}
      </div>
      <div id="feedback2"></div>
      <div class="btn-row" id="s2actions"></div>
    </div>
  `;
  window._routeFilled = new Array(n).fill(null);
}
function onDropRoute(e, idx){
  e.preventDefault();
  const zone = e.currentTarget;
  zone.classList.remove('dragover');
  if(state.answered) return;
  const id = e.dataTransfer.getData('text/plain');
  const role = roleById(id);
  zone.classList.add('filled');
  zone.innerHTML = `<div class="role-card" style="--role-color:${role.color}"><span class="dot"></span>${role.emoji} ${role.name}</div>`;
  window._routeFilled[idx] = id;
  const poolCard = document.querySelector(`#rolePool2 .role-card[data-id="${id}"]`);
  if(poolCard) poolCard.classList.add('placed');
  if(window._routeFilled.every(x=>x)){
    document.getElementById('s2actions').innerHTML = `<button class="btn" onclick="submitRoute()">Submit Route</button>`;
  }
}
function submitRoute(){
  if(state.answered) return;
  state.answered = true;
  const task = state.s2[state.q];
  const filled = window._routeFilled;
  const correct = filled.every((id,i)=>id===task.order[i]);

  state.maxScores.workflow += 1;
  if(correct) state.scores.workflow += 1;
  state.maxScores.delegation += 1;
  state.scores.delegation += correct ? 1 : 0.5;

  const flowHTML = task.order.map((id,i)=>{
    const r = roleById(id);
    return `<div class="flow-node" style="border-color:${r.color};animation-delay:${i*0.15}s">${r.emoji} ${r.name}</div>` + (i<task.order.length-1?`<span class="flow-arrow" style="animation-delay:${i*0.15+0.08}s">→</span>`:'');
  }).join('');

  document.getElementById('feedback2').innerHTML = `
    <div class="feedback">
      <h4>${correct? '✓ Great routing!' : '↳ Here is a workflow that works well'}</h4>
      <div class="flow-anim">${flowHTML}</div>
      <p>${task.why}</p>
    </div>
  `;
  document.getElementById('s2actions').innerHTML = `<button class="btn" onclick="nextStage2()">${state.q<2?'Next task →':'Continue to Stage 3 →'}</button>`;
}
function nextStage2(){
  state.q++;
  state.answered = false;
  if(state.q>=3){ state.screen='stage3'; state.stage=3; state.q=0; }
  render();
}

/* ============ STAGE 3 : COLLABORATION ============ */
function renderStage3(){
  const task = state.s3[state.q];
  app.innerHTML = `
    ${headerHTML()}
    <div class="card">
      <div class="stage-label">Stage 3 · Question ${state.q+1} of 3</div>
      <div class="stage-title">Collaboration Challenge</div>
      <div class="stage-desc">This situation is bigger than one role. Select up to <b>4</b> departments that should be involved.</div>
      <div class="ticket" style="border-left-color:var(--accent-eng)">
        <div class="tag">🚨 Organizational Situation</div>
        <div class="title">${task.title}</div>
      </div>
      <div class="multi-select-grid" id="multiSelect">
        ${ROLES.map(r=>`
          <div class="role-card selectable" data-id="${r.id}" style="--role-color:${r.color}" onclick="toggleSelect('${r.id}')">
            <span class="dot"></span>${r.emoji} ${r.name}
          </div>`).join('')}
      </div>
      <div id="feedback3"></div>
      <div class="btn-row" id="s3actions">
        <button class="btn" id="submit3btn" onclick="submitCollab()" disabled>Submit (select 1-4)</button>
      </div>
    </div>
  `;
  window._collabSelected = [];
}
function toggleSelect(id){
  if(state.answered) return;
  const card = document.querySelector(`#multiSelect .role-card[data-id="${id}"]`);
  const sel = window._collabSelected;
  const idx = sel.indexOf(id);
  if(idx>=0){ sel.splice(idx,1); card.classList.remove('selected'); }
  else{
    if(sel.length>=4) return;
    sel.push(id); card.classList.add('selected');
  }
  const btn = document.getElementById('submit3btn');
  btn.disabled = sel.length===0;
  btn.textContent = sel.length? `Submit (${sel.length} selected)` : 'Submit (select 1-4)';
}
function submitCollab(){
  if(state.answered) return;
  state.answered = true;
  const task = state.s3[state.q];
  const sel = window._collabSelected;
  const idealSet = new Set([task.primary, ...task.supporting]);
  const overlap = sel.filter(id=>idealSet.has(id)).length;
  const collabRatio = overlap / idealSet.size;

  state.maxScores.collaboration += 1;
  state.scores.collaboration += Math.min(1, collabRatio);
  state.maxScores.ownership += 1;
  state.scores.ownership += sel.includes(task.primary) ? 1 : 0.4;

  if(sel.length===1) state.reflectionNotes.underCollab++;
  if(sel.length>=4 && collabRatio<0.6) state.reflectionNotes.overAssign++;

  document.querySelectorAll('#multiSelect .role-card').forEach(c=>c.classList.add('placed'));

  document.getElementById('feedback3').innerHTML = `
    <div class="feedback">
      <h4>✓ Primary Owner: ${roleById(task.primary).emoji} ${roleById(task.primary).name}</h4>
      <div class="collab-summary">
        <div class="collab-row"><span class="label">Supporting Teams</span><span>${task.supporting.map(id=>roleById(id).name).join(', ')}</span></div>
        <div class="collab-row"><span class="label">Reasoning</span><span>${task.why}</span></div>
        <div class="collab-row"><span class="label">Communication Flow</span><span>${task.flow}</span></div>
      </div>
      <p style="margin-top:12px;color:var(--text-lo);font-size:0.82rem;">Complex, organization-wide problems like this one are rarely solved by a single person — the goal was to notice which roles the situation actually touches.</p>
    </div>
  `;
  document.getElementById('s3actions').innerHTML = `<button class="btn" onclick="nextStage3()">${state.q<2?'Next situation →':'See your results →'}</button>`;
}
function nextStage3(){
  state.q++;
  state.answered = false;
  if(state.q>=3){ state.screen='results'; buildReflection(); }
  render();
}

/* ============ RESULTS ============ */
let reflection = {};
function pct(score, max){ return max? Math.round((score/max)*100) : 0; }
function buildReflection(){
  const o = pct(state.scores.ownership, state.maxScores.ownership);
  const d = pct(state.scores.delegation, state.maxScores.delegation);
  const c = pct(state.scores.collaboration, state.maxScores.collaboration);
  const w = pct(state.scores.workflow, state.maxScores.workflow);

  reflection.wellUnderstood = o>=70
    ? "You consistently identified the right primary owner for tasks — you seem to have a clear instinct for where responsibility naturally sits in an org."
    : "You're building a sense for ownership, though a few tasks revealed some tricky edge cases between similar roles.";

  reflection.overAssign = state.reflectionNotes.overAssign>0
    ? "In a few moments you leaned on managers or product roles as the default owner, even when a more specific role (like an engineer or specialist) was actually closer to the work."
    : "You generally avoided defaulting to managers or 'the boss' as the owner of specific technical or user-facing tasks — a common trap.";

  reflection.underCollab = state.reflectionNotes.underCollab>0
    ? "On at least one big-picture situation, you selected only a single team. Many organization-wide problems tend to involve more than one function, even if there's a clear primary owner."
    : "You tended to bring in multiple teams for complex situations, which usually reflects how these problems actually get solved in practice.";

  reflection.insight = c>=d
    ? "Many real workplace problems are solved by teams rather than individuals — ownership tells you who's accountable, not who does all the work."
    : "Workflow order often matters as much as who's involved — the same set of people can produce very different outcomes depending on the sequence they collaborate in.";
}

function renderResults(){
  const o = pct(state.scores.ownership, state.maxScores.ownership);
  const d = pct(state.scores.delegation, state.maxScores.delegation);
  const c = pct(state.scores.collaboration, state.maxScores.collaboration);
  const w = pct(state.scores.workflow, state.maxScores.workflow);
  const cats = [
    {label:'Ownership', val:o, color:'var(--accent-frontend)'},
    {label:'Delegation', val:d, color:'var(--accent-backend)'},
    {label:'Collaboration', val:c, color:'var(--accent-ux)'},
    {label:'Workflow Thinking', val:w, color:'var(--accent-pm)'},
  ];
  app.innerHTML = `
    ${headerHTML()}
    <div class="card">
      <div class="celebrate">
        <div class="emoji">🏁</div>
        <div class="stage-title" style="margin-top:8px;">Simulation Complete</div>
        <p class="stage-desc">Here's how your thinking showed up across the three stages — not a score to beat, just a mirror.</p>
      </div>
      <div class="results-grid">
        ${cats.map(cat=>`
          <div class="stat-card">
            <div class="label">${cat.label}</div>
            <div class="bar-bg"><div class="bar-fill" style="width:0%;background:${cat.color}" data-target="${cat.val}"></div></div>
            <div class="val">${cat.val}%</div>
          </div>`).join('')}
      </div>
      <div class="reflection-list">
        <div class="reflection-item"><h5>What you understood well</h5><p>${reflection.wellUnderstood}</p></div>
        <div class="reflection-item" style="border-left-color:var(--accent-qa)"><h5>Where you tended to over-assign responsibility</h5><p>${reflection.overAssign}</p></div>
        <div class="reflection-item" style="border-left-color:var(--accent-ux)"><h5>Where you underestimated collaboration</h5><p>${reflection.underCollab}</p></div>
        <div class="reflection-item" style="border-left-color:var(--accent-pm)"><h5>One insight about organizations</h5><p>${reflection.insight}</p></div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="restart()">Play again</button>
      </div>
    </div>
  `;
  setTimeout(()=>{
    document.querySelectorAll('.bar-fill').forEach(el=>{ el.style.width = el.dataset.target+'%'; });
    launchConfetti();
  }, 150);
}
function launchConfetti(){
  const colors = ['#7c6ff0','#5ec8f8','#5ef0c2','#f0a35e','#f06f9c'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2+Math.random()*1.5)+'s';
    c.style.opacity = 0.85;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 3800);
  }
}
function restart(){
  state.screen='intro'; state.stage=1; state.q=0; state.answered=false;
  state.scores={ownership:0,delegation:0,collaboration:0,workflow:0};
  state.maxScores={ownership:0,delegation:0,collaboration:0,workflow:0};
  state.reflectionNotes={overAssign:0,underCollab:0,goodOwnership:0};
  state.s1=shuffle(STAGE1_TASKS).slice(0,3);
  state.s2=shuffle(STAGE2_TASKS).slice(0,3);
  state.s3=shuffle(STAGE3_TASKS).slice(0,3);
  render();
}

render();
</script>
</body>
</html>
