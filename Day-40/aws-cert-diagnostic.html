<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console Check — AWS Cert Diagnostic</title>
<style>
  :root{
    --navy-950:#0B1420;
    --navy-900:#101E30;
    --navy-800:#16283F;
    --navy-700:#1E344F;
    --slate-400:#7C93AC;
    --slate-200:#C7D4E2;
    --cloud-50:#EDF2F8;
    --aws-orange:#FF9900;
    --aws-orange-dim:#B96F00;
    --good:#3DD9A4;
    --warn:#FFC24B;
    --bad:#FF6B6B;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,153,0,0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(61,217,164,0.05), transparent 55%),
      var(--navy-950);
    color:var(--cloud-50);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  @font-face{font-family:'IBM Plex Mono';src:local('Courier New');}

  ::selection{background:var(--aws-orange);color:var(--navy-950);}

  a{color:var(--aws-orange);}

  .scanline{
    position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.008) 0px, rgba(255,255,255,0.008) 1px, transparent 1px, transparent 3px);
    opacity:0.5;
  }

  header{
    padding:28px 24px 18px;
    border-bottom:1px solid var(--navy-700);
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:12px;
    max-width:980px;margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:38px;height:38px;border-radius:8px;
    background:linear-gradient(135deg,var(--aws-orange),#FFB84D);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;color:var(--navy-950);font-size:15px;
    box-shadow:0 0 0 1px rgba(255,153,0,0.3), 0 4px 20px rgba(255,153,0,0.15);
  }
  .brand-text h1{font-size:17px;margin:0;font-weight:650;letter-spacing:-0.01em;}
  .brand-text p{margin:1px 0 0;font-size:12px;color:var(--slate-400);font-family:var(--mono);}
  .status-pill{
    font-family:var(--mono);font-size:11px;color:var(--good);
    border:1px solid rgba(61,217,164,0.35);background:rgba(61,217,164,0.08);
    padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;
  }
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  main{max-width:980px;margin:0 auto;padding:36px 24px 80px;}

  /* Setup screen */
  .setup-card{
    background:var(--navy-900);border:1px solid var(--navy-700);border-radius:14px;
    padding:32px;margin-bottom:20px;
  }
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--aws-orange);margin:0 0 8px;
  }
  h2{font-size:24px;margin:0 0 8px;font-weight:650;letter-spacing:-0.015em;}
  .lede{color:var(--slate-400);font-size:14.5px;line-height:1.55;margin:0 0 26px;max-width:60ch;}

  .field-group{margin-bottom:22px;}
  .field-label{font-size:12.5px;color:var(--slate-200);margin-bottom:10px;font-weight:600;display:block;}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    font-family:var(--sans);font-size:13.5px;padding:9px 15px;border-radius:8px;
    background:var(--navy-800);border:1px solid var(--navy-700);color:var(--slate-200);
    cursor:pointer;transition:all .15s ease;
  }
  .chip:hover{border-color:var(--slate-400);}
  .chip.selected{
    background:rgba(255,153,0,0.12);border-color:var(--aws-orange);color:#fff;
    box-shadow:0 0 0 1px rgba(255,153,0,0.2) inset;
  }

  .btn-primary{
    font-family:var(--sans);font-weight:650;font-size:14.5px;
    background:linear-gradient(135deg,var(--aws-orange),#FFAD33);
    color:var(--navy-950);border:none;padding:13px 24px;border-radius:9px;
    cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 4px 18px rgba(255,153,0,0.25);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,153,0,0.35);}
  .btn-primary:active{transform:translateY(0);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-ghost{
    font-family:var(--sans);font-size:13.5px;background:transparent;color:var(--slate-400);
    border:1px solid var(--navy-700);padding:11px 20px;border-radius:9px;cursor:pointer;
    transition:all .15s ease;
  }
  .btn-ghost:hover{border-color:var(--slate-400);color:var(--cloud-50);}

  /* Quiz screen */
  .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .progress-track{
    height:5px;background:var(--navy-800);border-radius:3px;overflow:hidden;margin-bottom:26px;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--aws-orange),#FFC466);
    transition:width .4s ease;border-radius:3px;
  }
  .q-counter{font-family:var(--mono);font-size:12px;color:var(--slate-400);}
  .q-domain-tag{
    font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--aws-orange);background:rgba(255,153,0,0.09);border:1px solid rgba(255,153,0,0.25);
    padding:3px 9px;border-radius:5px;
  }
  .question-card{
    background:var(--navy-900);border:1px solid var(--navy-700);border-radius:14px;padding:30px;
    animation:fadein .35s ease;
  }
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .q-text{font-size:17px;line-height:1.5;margin:10px 0 22px;font-weight:600;}
  .option{
    display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:10px;
    border:1px solid var(--navy-700);background:var(--navy-800);margin-bottom:10px;
    cursor:pointer;transition:all .15s ease;
  }
  .option:hover{border-color:var(--slate-400);background:var(--navy-700);}
  .option.chosen{border-color:var(--aws-orange);background:rgba(255,153,0,0.1);}
  .option-letter{
    font-family:var(--mono);font-size:12px;font-weight:700;color:var(--slate-400);
    width:22px;height:22px;border-radius:6px;border:1px solid var(--navy-700);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  }
  .option.chosen .option-letter{color:var(--navy-950);background:var(--aws-orange);border-color:var(--aws-orange);}
  .option-text{font-size:14.5px;line-height:1.5;color:var(--slate-200);}
  .quiz-nav{display:flex;justify-content:space-between;margin-top:24px;}

  /* Loading */
  .loading-wrap{text-align:center;padding:70px 20px;}
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:2.5px solid var(--navy-700);border-top-color:var(--aws-orange);
    animation:spin .8s linear infinite;margin:0 auto 20px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-msg{font-family:var(--mono);font-size:13px;color:var(--slate-400);}

  /* Results */
  .result-hero{
    display:flex;gap:28px;align-items:center;flex-wrap:wrap;
    background:var(--navy-900);border:1px solid var(--navy-700);border-radius:14px;
    padding:32px;margin-bottom:20px;
  }
  .score-dial{position:relative;width:150px;height:150px;flex-shrink:0;}
  .score-dial svg{transform:rotate(-90deg);}
  .score-dial-label{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .score-num{font-family:var(--mono);font-size:32px;font-weight:700;}
  .score-den{font-family:var(--mono);font-size:11px;color:var(--slate-400);}
  .verdict-block h3{margin:0 0 6px;font-size:20px;}
  .verdict-badge{
    display:inline-block;font-family:var(--mono);font-size:11px;text-transform:uppercase;
    letter-spacing:0.06em;padding:4px 10px;border-radius:5px;margin-bottom:12px;
  }
  .verdict-block p{color:var(--slate-400);font-size:14px;line-height:1.55;margin:0;max-width:52ch;}

  .domain-section{
    background:var(--navy-900);border:1px solid var(--navy-700);border-radius:14px;
    padding:28px 30px;margin-bottom:20px;
  }
  .domain-section h3{font-size:14px;margin:0 0 20px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em;color:var(--slate-200);}
  .domain-row{margin-bottom:18px;}
  .domain-row:last-child{margin-bottom:0;}
  .domain-row-top{display:flex;justify-content:space-between;margin-bottom:7px;}
  .domain-name{font-size:13.5px;color:var(--cloud-50);font-weight:600;}
  .domain-pct{font-family:var(--mono);font-size:12.5px;color:var(--slate-400);}
  .bar-track{height:9px;background:var(--navy-800);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;transition:width 1s cubic-bezier(.2,.8,.2,1);}

  .drill-section{
    background:var(--navy-900);border:1px solid var(--navy-700);border-radius:14px;
    padding:28px 30px;margin-bottom:20px;
  }
  .drill-item{border-left:2px solid var(--navy-700);padding-left:16px;margin-bottom:20px;}
  .drill-item:last-child{margin-bottom:0;}
  .drill-item.wrong{border-left-color:var(--bad);}
  .drill-q{font-size:14px;font-weight:600;margin:0 0 8px;line-height:1.5;}
  .drill-line{font-size:13px;line-height:1.6;color:var(--slate-400);margin:0 0 4px;}
  .drill-line b{color:var(--slate-200);}
  .drill-explain{
    font-size:13px;line-height:1.6;color:var(--slate-200);margin-top:8px;
    background:var(--navy-800);border-radius:8px;padding:12px 14px;
  }

  .action-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}

  .error-box{
    background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.3);
    color:#FFB3B3;padding:16px 18px;border-radius:10px;font-size:13.5px;margin-bottom:20px;
  }

  footer{max-width:980px;margin:0 auto;padding:0 24px 60px;}
  .docs-toggle{
    width:100%;text-align:left;background:var(--navy-900);border:1px solid var(--navy-700);
    color:var(--slate-200);padding:16px 20px;border-radius:12px;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;font-family:var(--sans);
    font-size:13.5px;font-weight:600;
  }
  .docs-toggle:hover{border-color:var(--slate-400);}
  .docs-chevron{transition:transform .2s ease;color:var(--slate-400);}
  .docs-chevron.open{transform:rotate(180deg);}
  .docs-panel{
    max-height:0;overflow:hidden;transition:max-height .35s ease;
  }
  .docs-panel.open{max-height:3000px;}
  .docs-inner{
    padding:22px 20px 4px;font-size:13.5px;line-height:1.7;color:var(--slate-400);
  }
  .docs-inner h4{color:var(--cloud-50);font-size:13px;text-transform:uppercase;letter-spacing:0.04em;font-family:var(--mono);margin:22px 0 8px;}
  .docs-inner h4:first-child{margin-top:0;}
  .docs-inner code{
    background:var(--navy-800);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--aws-orange);
  }
  .docs-inner ul{padding-left:20px;margin:8px 0;}
  .docs-inner li{margin-bottom:6px;}

  @media (max-width:600px){
    .setup-card,.question-card,.domain-section,.drill-section{padding:20px;}
    .result-hero{padding:22px;}
    h2{font-size:20px;}
  }
</style>
</head>
<body>
<div class="scanline"></div>

<header>
  <div class="brand">
    <div class="brand-mark">λ</div>
    <div class="brand-text">
      <h1>Console Check</h1>
      <p>AWS certification diagnostic</p>
    </div>
  </div>
  <div class="status-pill"><span class="status-dot"></span>engine ready</div>
</header>

<main id="app"></main>

<footer>
  <button class="docs-toggle" id="docsToggle">
    <span>How this was built</span>
    <svg class="docs-chevron" id="docsChevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <div class="docs-panel" id="docsPanel">
    <div class="docs-inner" id="docsInner"></div>
  </div>
</footer>

<script>
const CERTS = {
  clf: {label:'Cloud Practitioner', full:'AWS Certified Cloud Practitioner (CLF-C02)',
    domains:['Cloud Concepts','Security & Compliance','Cloud Technology & Services','Billing, Pricing & Support']},
  saa: {label:'Solutions Architect – Associate', full:'AWS Certified Solutions Architect – Associate (SAA-C03)',
    domains:['Secure Architectures','Resilient Architectures','High-Performing Architectures','Cost-Optimized Architectures']},
  dva: {label:'Developer – Associate', full:'AWS Certified Developer – Associate (DVA-C02)',
    domains:['Development with AWS Services','Security','Deployment','Troubleshooting & Optimization']},
  soa: {label:'SysOps Administrator – Associate', full:'AWS Certified SysOps Administrator – Associate (SOA-C02)',
    domains:['Monitoring & Logging','Reliability & Business Continuity','Deployment, Provisioning & Automation','Security & Compliance','Networking & Content Delivery','Cost & Performance Optimization']}
};

const SYSTEM_PROMPT_TEMPLATE = (certFull, domains, numQ) => `You are Console Check, an expert AWS certification exam-prep tutor specializing in the ${certFull}.

ROLE & SCOPE
- You generate short, realistic diagnostic quizzes for AWS certification candidates and grade/analyze their results.
- Exam domains for this certification: ${domains.join(', ')}.
- Stay strictly within AWS certification prep. If asked about unrelated topics, politely redirect to AWS study help.

TASK MODES
You will be called in one of two modes, indicated by the input JSON's "mode" field:

1. mode = "generate_quiz"
   Input: { mode, cert, domains, numQuestions }
   Output ONLY valid JSON (no markdown fences, no preamble):
   {
     "questions": [
       {
         "id": 1,
         "domain": "<one of the provided domains>",
         "question": "<realistic scenario-based multiple choice question, exam difficulty>",
         "options": [{"key":"A","text":"..."}, {"key":"B","text":"..."}, {"key":"C","text":"..."}, {"key":"D","text":"..."}],
         "correctKey": "B",
         "explanation": "<2-3 sentence explanation of why the correct answer is right and why the others are wrong, written for someone who just missed it>"
       }
     ]
   }
   - Generate exactly ${numQ} questions, distributed as evenly as possible across the listed domains.
   - Questions must be scenario-based where possible (real AWS service tradeoffs), matching real exam style and difficulty — not trivia.
   - Never repeat the same question stem or answer pattern (don't make "C" always correct).

2. mode = "grade"
   Input: { mode, cert, questions: [...], answers: {questionId: chosenKey} }
   Output ONLY valid JSON (no markdown fences, no preamble):
   {
     "totalCorrect": <int>,
     "totalQuestions": <int>,
     "verdict": "<one short phrase like 'Not exam-ready yet' / 'Borderline — needs focused review' / 'On track' / 'Exam-ready'>",
     "verdictSummary": "<2-3 sentence honest, expert assessment of overall readiness>",
     "domainBreakdown": [
       {"domain":"<domain name>", "correct": <int>, "total": <int>, "percentage": <int 0-100>}
     ],
     "weakSpots": [
       {
         "questionId": <int>,
         "domain": "<domain>",
         "question": "<restate question briefly>",
         "yourAnswer": "<the option text they chose>",
         "correctAnswer": "<the correct option text>",
         "explanation": "<clear, professional explanation of the underlying concept they need to review, 2-4 sentences>"
       }
     ]
   }
   - weakSpots should include every question they got wrong (do not omit any).
   - Domain breakdown must cover every domain in the quiz, even 100% or 0% ones.
   - Be honest and direct in the verdict — this is exam prep, not participation-trophy feedback. A low score should say so plainly, while remaining constructive.

TONE
Professional, expert, direct. You are a knowledgeable AWS-certified colleague giving a candid readiness assessment — not a cheerleader, not harsh. No fluff, no filler praise, no emoji.

EDGE CASES
- If input JSON is malformed or missing required fields, output: {"error": "invalid_input", "message": "<what's missing>"}.
- Never include markdown code fences around your JSON output. Output raw JSON only, as the very first character of your response.
- Never fabricate AWS service behavior — only use accurate, current AWS service facts in questions and explanations.`;

let state = {
  screen: 'setup',
  cert: null,
  numQuestions: 6,
  questions: [],
  currentQ: 0,
  answers: {},
  result: null,
  error: null
};

const app = document.getElementById('app');

function render(){
  if(state.screen === 'setup') return renderSetup();
  if(state.screen === 'loadingQuiz') return renderLoading('Preparing your diagnostic questions...');
  if(state.screen === 'quiz') return renderQuiz();
  if(state.screen === 'loadingGrade') return renderLoading('Grading and analyzing your weak spots...');
  if(state.screen === 'results') return renderResults();
}

function renderSetup(){
  const certKeys = Object.keys(CERTS);
  app.innerHTML = `
    <div class="setup-card">
      <p class="eyebrow">Diagnostic setup</p>
      <h2>Which cert are you cramming for?</h2>
      <p class="lede">Pick a certification and quiz length. You'll get a short scenario-based diagnostic, then a scored breakdown by exam domain with weak-spot explanations.</p>

      <div class="field-group">
        <span class="field-label">Certification</span>
        <div class="chip-row" id="certChips">
          ${certKeys.map(k => `<div class="chip ${state.cert===k?'selected':''}" data-cert="${k}">${CERTS[k].label}</div>`).join('')}
        </div>
      </div>

      <div class="field-group">
        <span class="field-label">Quiz length</span>
        <div class="chip-row" id="lenChips">
          ${[4,6,8].map(n => `<div class="chip ${state.numQuestions===n?'selected':''}" data-num="${n}">${n} questions</div>`).join('')}
        </div>
      </div>

      ${state.error ? `<div class="error-box">${state.error}</div>` : ''}

      <button class="btn-primary" id="startBtn" ${!state.cert?'disabled':''}>Start diagnostic →</button>
    </div>
  `;
  document.querySelectorAll('#certChips .chip').forEach(el=>{
    el.onclick = ()=>{ state.cert = el.dataset.cert; render(); };
  });
  document.querySelectorAll('#lenChips .chip').forEach(el=>{
    el.onclick = ()=>{ state.numQuestions = parseInt(el.dataset.num); render(); };
  });
  const startBtn = document.getElementById('startBtn');
  if(startBtn) startBtn.onclick = startQuiz;
}

function renderLoading(msg){
  app.innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-msg">${msg}</div>
    </div>
  `;
}

function renderQuiz(){
  const q = state.questions[state.currentQ];
  const pct = Math.round(((state.currentQ)/state.questions.length)*100);
  const chosen = state.answers[q.id];
  app.innerHTML = `
    <div class="quiz-header">
      <span class="q-counter">QUESTION ${state.currentQ+1} / ${state.questions.length}</span>
      <span class="q-domain-tag">${q.domain}</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-card">
      <p class="q-text">${q.question}</p>
      ${q.options.map(opt => `
        <div class="option ${chosen===opt.key?'chosen':''}" data-key="${opt.key}">
          <div class="option-letter">${opt.key}</div>
          <div class="option-text">${opt.text}</div>
        </div>
      `).join('')}
      <div class="quiz-nav">
        <button class="btn-ghost" id="backBtn" ${state.currentQ===0?'disabled':''}>← Back</button>
        <button class="btn-primary" id="nextBtn" ${!chosen?'disabled':''}>
          ${state.currentQ === state.questions.length-1 ? 'Finish & grade →' : 'Next →'}
        </button>
      </div>
    </div>
  `;
  document.querySelectorAll('.option').forEach(el=>{
    el.onclick = ()=>{ state.answers[q.id] = el.dataset.key; render(); };
  });
  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = ()=>{ state.currentQ--; render(); };
  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn) nextBtn.onclick = ()=>{
    if(state.currentQ < state.questions.length-1){ state.currentQ++; render(); }
    else gradeQuiz();
  };
}

function verdictColor(pct){
  if(pct>=80) return 'var(--good)';
  if(pct>=55) return 'var(--warn)';
  return 'var(--bad)';
}

function renderResults(){
  const r = state.result;
  const pct = Math.round((r.totalCorrect/r.totalQuestions)*100);
  const color = verdictColor(pct);
  const circumference = 2*Math.PI*62;
  const offset = circumference - (pct/100)*circumference;

  app.innerHTML = `
    <div class="result-hero">
      <div class="score-dial">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="62" fill="none" stroke="var(--navy-800)" stroke-width="10"/>
          <circle cx="75" cy="75" r="62" fill="none" stroke="${color}" stroke-width="10"
            stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}" stroke-linecap="round"
            id="scoreCircle" style="transition: stroke-dashoffset 1.2s cubic-bezier(.2,.8,.2,1);"/>
        </svg>
        <div class="score-dial-label">
          <div class="score-num" style="color:${color}">${pct}%</div>
          <div class="score-den">${r.totalCorrect}/${r.totalQuestions} correct</div>
        </div>
      </div>
      <div class="verdict-block">
        <span class="verdict-badge" style="color:${color};background:${color}22;border:1px solid ${color}55;">${r.verdict}</span>
        <h3>${CERTS[state.cert].full}</h3>
        <p>${r.verdictSummary}</p>
      </div>
    </div>

    <div class="domain-section">
      <h3>Domain breakdown</h3>
      ${r.domainBreakdown.map(d => `
        <div class="domain-row">
          <div class="domain-row-top">
            <span class="domain-name">${d.domain}</span>
            <span class="domain-pct">${d.correct}/${d.total} · ${d.percentage}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" data-pct="${d.percentage}" style="width:0%;background:${verdictColor(d.percentage)}"></div></div>
        </div>
      `).join('')}
    </div>

    ${r.weakSpots.length ? `
    <div class="drill-section">
      <h3 style="font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em;font-size:14px;color:var(--slate-200);margin:0 0 20px;">Weak spots to drill</h3>
      ${r.weakSpots.map(w => `
        <div class="drill-item wrong">
          <p class="drill-q">${w.question}</p>
          <p class="drill-line">Your answer: <b>${w.yourAnswer}</b></p>
          <p class="drill-line">Correct answer: <b>${w.correctAnswer}</b></p>
          <div class="drill-explain">${w.explanation}</div>
        </div>
      `).join('')}
    </div>
    ` : `
    <div class="drill-section">
      <p style="margin:0;color:var(--good);font-size:14px;">No misses — clean sweep on this diagnostic. Try a longer quiz or a different cert to keep stress-testing.</p>
    </div>
    `}

    <div class="action-row">
      <button class="btn-primary" id="retryBtn">Run another diagnostic</button>
      <button class="btn-ghost" id="sameCertBtn">Retry same cert</button>
    </div>
  `;

  requestAnimationFrame(()=>{
    const circle = document.getElementById('scoreCircle');
    if(circle) circle.style.strokeDashoffset = offset;
    document.querySelectorAll('.bar-fill').forEach(el=>{
      setTimeout(()=>{ el.style.width = el.dataset.pct + '%'; }, 150);
    });
  });

  document.getElementById('retryBtn').onclick = ()=>{
    state = {screen:'setup', cert:null, numQuestions:6, questions:[], currentQ:0, answers:{}, result:null, error:null};
    render();
  };
  document.getElementById('sameCertBtn').onclick = ()=>{
    const cert = state.cert, num = state.numQuestions;
    state = {screen:'setup', cert, numQuestions:num, questions:[], currentQ:0, answers:{}, result:null, error:null};
    startQuiz();
  };
}

async function callClaude(systemPrompt, userContent){
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: "user", content: userContent }]
    })
  });
  if(!response.ok){
    throw new Error(`API error: ${response.status}`);
  }
  const data = await response.json();
  const textBlock = data.content.find(b => b.type === 'text');
  if(!textBlock) throw new Error('No text in response');
  let raw = textBlock.text.trim();
  raw = raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'');
  return JSON.parse(raw);
}

async function startQuiz(){
  state.error = null;
  state.screen = 'loadingQuiz';
  render();
  try{
    const certInfo = CERTS[state.cert];
    const systemPrompt = SYSTEM_PROMPT_TEMPLATE(certInfo.full, certInfo.domains, state.numQuestions);
    const userContent = JSON.stringify({
      mode: "generate_quiz",
      cert: certInfo.full,
      domains: certInfo.domains,
      numQuestions: state.numQuestions
    });
    const json = await callClaude(systemPrompt, userContent);
    if(json.error) throw new Error(json.message || 'Could not generate quiz');
    state.questions = json.questions;
    state.currentQ = 0;
    state.answers = {};
    state.screen = 'quiz';
    render();
  }catch(e){
    state.error = "Couldn't generate the quiz. " + (e.message || 'Please try again.');
    state.screen = 'setup';
    render();
  }
}

async function gradeQuiz(){
  state.screen = 'loadingGrade';
  render();
  try{
    const certInfo = CERTS[state.cert];
    const systemPrompt = SYSTEM_PROMPT_TEMPLATE(certInfo.full, certInfo.domains, state.numQuestions);
    const userContent = JSON.stringify({
      mode: "grade",
      cert: certInfo.full,
      questions: state.questions,
      answers: state.answers
    });
    const json = await callClaude(systemPrompt, userContent);
    if(json.error) throw new Error(json.message || 'Could not grade quiz');
    state.result = json;
    state.screen = 'results';
    render();
  }catch(e){
    state.error = "Couldn't grade the quiz. " + (e.message || 'Please try again.');
    state.screen = 'setup';
    state.questions = [];
    state.currentQ = 0;
    state.answers = {};
    render();
  }
}

render();
