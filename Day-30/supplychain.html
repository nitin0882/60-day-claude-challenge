const { useState, useMemo } = React;

/* ---------------------------------------------------------
   DATA: Random company generation
--------------------------------------------------------- */
const INDUSTRIES = [
  { name: "Athletic Footwear", product: "running shoes", icon:"👟" },
  { name: "Consumer Electronics", product: "wireless earbuds", icon:"🎧" },
  { name: "Organic Food", product: "snack bars", icon:"🍫" },
  { name: "Furniture", product: "flat-pack desks", icon:"🪑" },
  { name: "Cosmetics", product: "skincare kits", icon:"🧴" },
  { name: "Toys", product: "building block sets", icon:"🧸" },
  { name: "Outdoor Gear", product: "camping tents", icon:"⛺" },
  { name: "Pet Supplies", product: "premium dog food", icon:"🐕" },
];

const REGIONS = [
  "North America", "Europe", "Southeast Asia", "South America", "Australia & Oceania", "Middle East"
];

const DEMAND_LEVELS = [
  { level: "Steady", desc: "predictable, consistent orders year-round" },
  { level: "Seasonal Spikes", desc: "big surges around holidays, quiet the rest of the year" },
  { level: "Rapid Growth", desc: "demand is climbing fast month over month" },
];

function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generateCompany(){
  const industry = randomFrom(INDUSTRIES);
  const shuffledRegions = [...REGIONS].sort(()=>Math.random()-0.5);
  const countryCount = 1 + Math.floor(Math.random()*3); // 1-3
  const countries = shuffledRegions.slice(0, countryCount);
  const demand = randomFrom(DEMAND_LEVELS);
  const names = ["Northwind", "Solace", "Verdant", "Atlas", "Brightline", "Cobalt", "Fernway", "Harbor", "Lumen", "Meridian"];
  const suffix = ["Goods", "Co.", "Supply Co.", "Industries", "& Sons", "Collective"];
  const companyName = `${randomFrom(names)} ${randomFrom(suffix)}`;
  return {
    name: companyName,
    industry: industry.name,
    icon: industry.icon,
    product: industry.product,
    countries,
    demand,
  };
}

/* ---------------------------------------------------------
   METRICS ENGINE
   Each decision nudges 5 metrics. All metrics 0-100.
   Higher Cost = worse (more expensive). We display cost as
   "Cost Efficiency" is NOT used - we show raw cost level,
   labeled clearly so beginners understand higher bar = higher cost.
--------------------------------------------------------- */
const BASE_METRICS = { cost: 45, speed: 50, risk: 45, satisfaction: 50, sustainability: 50 };

function clamp(n){ return Math.max(4, Math.min(96, n)); }

function applyDelta(metrics, delta){
  const next = {...metrics};
  Object.keys(delta).forEach(k=>{
    next[k] = clamp(next[k] + delta[k]);
  });
  return next;
}

function ProgressSteps({ current, total }){
  return (
    <div className="progress-steps">
      {Array.from({length: total}).map((_,i)=>(
        <div key={i} className={
          "step-dot " + (i < current ? "done" : i === current ? "active" : "")

      ))}

  );
}

  );
}

function CompanyCard({ company }){
  return (
    <div className="card fade-in">
      <div style={{display:"flex", alignItems:"center", gap:"14px"}}>
        <div style={{fontSize:"2.4rem"}}>{company.icon}</div>
        <div>
          <h2 style={{marginBottom:2}}>{company.name}</h2>
          <span className="muted">{company.industry} • makes {company.product}</span>
        </div>
      </div>
      <div className="company-grid">
        <div className="stat-box">
          <div className="label">Product</div>
          <div className="value">{company.product}</div>
        </div>

        </div>

function TagPill({ tag }){
  const [cls, text] = tag;
  return <span className={"tag " + cls}>{text}</span>;
}

function DecisionStep({ stepDef, onChoose, chosenId }){
  return (
    <div className="card fade-in">
      <span className="pill">Decision</span>

        {stepDef.options.map(opt=>(
          <div
            key={opt.id}
            className={"option-card" + (chosenId===opt.id ? " selected":"")}

}

function ExplainBox({ text }){
  if(!text) return null;
  return (
    <div className="explain-box fade-in">
      <b>💡 Trade-off explained:</b> {text}
    </div>
  );
}

/* ---------------------------------------------------------
   SCORE COMPUTATION
--------------------------------------------------------- */
function computeScore(metrics){
  // cost & risk are "bad when high", others "good when high"
  const costScore = 100 - metrics.cost;
  const riskScore = 100 - metrics.risk;
  const raw = (costScore*0.2 + metrics.speed*0.2 + riskScore*0.25 + metrics.satisfaction*0.2 + metrics.sustainability*0.15);
  return Math.round(raw);
}

function ScoreRing({ score }){
  const radius = 78;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score/100)*circumference;
  let color = "var(--bad)";
  if(score >= 70) color = "var(--good)";
  else if(score >= 45) color = "var(--warn)";
  return (
    <div className="score-ring">
      <svg width="180" height="180">
        <circle cx="90" cy="90" r={radius} stroke="#1d2334" strokeWidth="14" fill="none" />
        <circle
          cx="90" cy="90" r={radius}
          stroke={color}
          strokeWidth="14"
          fill="none"
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          strokeLinecap="round"
          style={{transition:"stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)"}}
        />
      </svg>
      <div className="score-center">
        <div className="score-num" style={{color}}>{score}</div>
        <div className="score-sub">/ 100</div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   DASHBOARD ANALYSIS
--------------------------------------------------------- */
function analyzeMetrics(metrics, choices){
  const items = [
    { key:"cost", label:"Cost Efficiency", good: 100-metrics.cost >= 60, value: 100-metrics.cost },
    { key:"speed", label:"Delivery Speed", good: metrics.speed >= 60, value: metrics.speed },
    { key:"risk", label:"Risk Management", good: 100-metrics.risk >= 60, value: 100-metrics.risk },
    { key:"satisfaction", label:"Customer Satisfaction", good: metrics.satisfaction >= 60, value: metrics.satisfaction },
    { key:"sustainability", label:"Sustainability", good: metrics.sustainability >= 60, value: metrics.sustainability },
  ];
  const strengths = items.filter(i=>i.good).sort((a,b)=>b.value-a.value).slice(0,3);
  const weaknesses = items.filter(i=>!i.good).sort((a,b)=>a.value-b.value).slice(0,3);

  // biggest risk narrative
  let biggestRisk = "";
  if(metrics.risk >= 60){
    biggestRisk = "Your supply chain has very little redundancy. A single disruption — a late shipment, a supplier issue, or a warehouse outage — could halt operations because you don't have enough backup capacity built in.";
  } else if(metrics.cost >= 75){
    biggestRisk = "Your operating costs are very high relative to the value you're delivering. If demand softens or a competitor undercuts pricing, thin margins could turn into losses quickly.";
  } else if(metrics.satisfaction <= 40){
    biggestRisk = "Customers are likely experiencing slow delivery or unreliable stock levels. Low satisfaction tends to compound over time as customers churn to competitors.";
  } else if(metrics.sustainability <= 35){
    biggestRisk = "Your supply chain has a heavy environmental footprint. This could expose you to regulatory costs, carbon taxes, or reputational damage as sustainability expectations rise.";
  } else {
    biggestRisk = "Your supply chain is fairly well balanced, but keep an eye on cost creep — even efficient networks can slowly become expensive as they scale without periodic review.";
  }

  // improvements based on weakest areas
  const improvementBank = {
    cost: "Renegotiate supplier contracts or consolidate shipments to reduce per-unit transportation cost.",
    speed: "Add a regional warehouse or switch a leg of transportation to a faster mode for high-demand markets.",
    risk: "Diversify your supplier base or add backup transportation routes so a single disruption can't halt operations.",
    satisfaction: "Increase safety stock in high-demand regions or speed up last-mile delivery to reduce customer wait times.",
    sustainability: "Shift a portion of transportation from air to sea or rail, and consolidate warehouse footprint to cut emissions.",
  };
  const sortedByNeed = [...items].sort((a,b)=>a.value-b.value);
  const improvements = sortedByNeed.slice(0,3).map(i=>improvementBank[i.key]);

  return { strengths, weaknesses, biggestRisk, improvements };
}

/* ---------------------------------------------------------
   DASHBOARD (FINAL SCREEN)
--------------------------------------------------------- */
function Dashboard({ company, metrics, choices, onReplay }){
  const score = computeScore(metrics);
  const { strengths, weaknesses, biggestRisk, improvements } = analyzeMetrics(metrics, choices);

  let verdict = "Needs Improvement";
  if(score >= 80) verdict = "Excellent";
  else if(score >= 65) verdict = "Strong";
  else if(score >= 50) verdict = "Workable";
  else if(score >= 35) verdict = "Fragile";

  return (
    <div className="fade-in">
      <div className="card" style={{textAlign:"center"}}>
        <span className="pill">Final Report</span>
        <h1>{company.name}'s Supply Chain Report</h1>
        <p className="muted">Here's how the decisions you made add up to an overall performance score.</p>
        <ScoreRing score={score} />
        <h2 style={{marginTop:4}}>{verdict}</h2>
      </div>

      <div className="card">
        <h3>📈 Final Metrics</h3>
        <MetricBar label="Cost" value={metrics.cost} cls="cost" hint="Higher = more expensive to run" />
        <MetricBar label="Delivery Speed" value={metrics.speed} cls="speed" hint="Higher = faster to customers" />
        <MetricBar label="Risk" value={metrics.risk} cls="risk" hint="Higher = more exposed to disruption" />
        <MetricBar label="Customer Satisfaction" value={metrics.satisfaction} cls="sat" hint="Higher = happier customers" />
        <MetricBar label="Sustainability" value={metrics.sustainability} cls="sus" hint="Higher = lower environmental impact" />
      </div>

      <div className="two-col">
        <div className="card">
          <h3>✅ Strengths</h3>
          {strengths.length === 0 && <p className="muted">No standout strengths yet — most areas need attention.</p>}
          <ul className="list-check">
            {strengths.map(s=>(
              <li key={s.key}><span className="badge-strength">{s.label}</span> is performing well.</li>
            ))}
          </ul>
        </div>
        <div className="card">
          <h3>⚠️ Weaknesses</h3>
          {weaknesses.length === 0 && <p className="muted">No major weaknesses — a well-rounded supply chain!</p>}
          <ul className="list-check">
            {weaknesses.map(w=>(
              <li key={w.key}><span className="badge-weak">{w.label}</span> could use improvement.</li>
            ))}
          </ul>
        </div>
      </div>

      <div className="card risk-callout">
        <h3>🚨 Biggest Risk</h3>
        <p>{biggestRisk}</p>
      </div>

      <div className="card">
        <h3>🔧 Three Practical Improvements</h3>
        <ul className="list-check">
          {improvements.map((imp,i)=>(
            <li key={i}>{imp}</li>
          ))}
        </ul>
      </div>

      <div className="card">
        <h3>🗺️ Your Decisions Recap</h3>
        <div className="tag-row">
          {choices.map((c,i)=>(
            <span key={i} className="pill">{c.stepTitle}: {c.optionTitle}</span>
          ))}
        </div>
      </div>

      <div className="footer-actions">
        <button className="btn" onClick={onReplay}>🔁 Build a New Supply Chain</button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   MAIN APP
--------------------------------------------------------- */
function App(){
  const [screen, setScreen] = useState("welcome"); // welcome | company | building | dashboard
  const [company, setCompany] = useState(null);
  const [stepIndex, setStepIndex] = useState(0);
  const [metrics, setMetrics] = useState(BASE_METRICS);
  const [choices, setChoices] = useState([]);
  const [lastExplain, setLastExplain] = useState("");
  const [chosenIdForStep, setChosenIdForStep] = useState(null);

  function startGame(){
    setCompany(generateCompany());
    setScreen("company");
  }

  function beginBuilding(){
    setStepIndex(0);
    setMetrics(BASE_METRICS);
    setChoices([]);
    setLastExplain("");
    setChosenIdForStep(null);
    setScreen("building");
  }

  function handleChoose(stepKey, option){
    setChosenIdForStep(option.id);
    const newMetrics = applyDelta(metrics, option.delta);
    setMetrics(newMetrics);
    setLastExplain(option.explain);
    const stepDef = STEP_DEFS[stepIndex];
    setChoices(prev => [...prev, {
      stepKey,
      stepTitle: stepDef.title.replace("Choose Your ", "").replace("Choose ", ""),
      optionTitle: option.title,
    }]);

    setTimeout(()=>{
      if(stepIndex + 1 < STEP_DEFS.length){
        setStepIndex(stepIndex+1);
        setChosenIdForStep(null);
        setLastExplain("");
      } else {
        setScreen("dashboard");
      }
    }, 1400);
  }

  function replay(){
    setScreen("welcome");
    setCompany(null);
    setStepIndex(0);
    setMetrics(BASE_METRICS);
    setChoices([]);
    setLastExplain("");
    setChosenIdForStep(null);
  }

  const stepDef = STEP_DEFS[stepIndex];

  return (
    <div className="app">
      <div className="header">
        <Logo />
        {screen === "building" && (
          <span className="muted" style={{fontSize:"0.85rem"}}>
            Step {stepIndex+1} of {STEP_DEFS.length}
          </span>
        )}
      </div>

      {screen === "welcome" && <Welcome onStart={startGame} />}

      {screen === "company" && company && (
        <div>
          <CompanyCard company={company} />
          <div className="card" style={{textAlign:"center"}}>
            <h3>Ready to design {company.name}'s supply chain?</h3>
            <p className="muted">
              You'll make five decisions. Each one shifts your Cost, Speed, Risk,
              Customer Satisfaction, and Sustainability — there's no single perfect
              answer, only trade-offs to balance based on what this company needs.
            </p>
            <button className="btn" onClick={beginBuilding}>Start Building →</button>
          </div>
        </div>
      )}

      {screen === "building" && company && (
        <div className="layout">
          <div>
            <ProgressSteps current={stepIndex} total={STEP_DEFS.length} />
            <DecisionStep
              stepDef={stepDef}
              onChoose={handleChoose}
              chosenId={chosenIdForStep}
            />
            <ExplainBox text={lastExplain} />
          </div>
          <div>
            <MetricsPanel metrics={metrics} />
          </div>
        </div>
      )}

      {screen === "dashboard" && company && (
        <Dashboard
          company={company}
          metrics={metrics}
          choices={choices}
          onReplay={replay}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
