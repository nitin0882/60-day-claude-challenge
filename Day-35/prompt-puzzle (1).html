<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧩 Prompt Puzzle — Master AI Prompting Through Play</title>
<style>
  :root{
    --ink:#0e1420;
    --ink2:#141c2c;
    --panel:#182236;
    --panel2:#1d2a42;
    --line:#2a3854;
    --paper:#eef1f6;
    --paper-dim:#a9b6cf;
    --teal:#3ddcb0;
    --amber:#f2b544;
    --coral:#ef6f6f;
    --violet:#9d8cf2;
    --font-display: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --font-body: 'Segoe UI', -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'Consolas', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, #1c2942 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 0%, #17233a 0%, transparent 55%),
      var(--ink);
    color:var(--paper);
    font-family:var(--font-body);
    min-height:100vh;
    overflow-x:hidden;
  }
  .bg-grid{
    position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.06;
    background-image:
      linear-gradient(var(--teal) 1px, transparent 1px),
      linear-gradient(90deg, var(--teal) 1px, transparent 1px);
    background-size:42px 42px;
  }
  #app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:28px 20px 80px;}

  /* ---------- Header ---------- */
  .brand{
    display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:10px;margin-bottom:6px;
  }
  .brand h1{
    font-family:var(--font-display);
    font-size:clamp(24px,4vw,34px);
    margin:0;
    letter-spacing:.3px;
    color:var(--paper);
  }
  .brand h1 .tag{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--teal);
    display:block;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .brand .meta{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--paper-dim);
    text-align:right;
  }
  .divider{height:1px;background:linear-gradient(90deg,var(--teal),transparent 70%);margin:14px 0 24px;opacity:.5;}

  /* ---------- Progress bar ---------- */
  .progress-wrap{display:flex;gap:6px;margin-bottom:22px;}
  .progress-seg{flex:1;height:6px;border-radius:4px;background:var(--panel2);overflow:hidden;position:relative;}
  .progress-seg.done::after{content:'';position:absolute;inset:0;background:var(--teal);}
  .progress-seg.current::after{content:'';position:absolute;inset:0;background:var(--amber);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}

  /* ---------- Panels ---------- */
  .panel{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px;
    margin-bottom:20px;
    box-shadow:0 10px 30px -18px rgba(0,0,0,.6);
  }
  .panel h2{font-family:var(--font-display);font-size:20px;margin:0 0 4px;color:var(--paper);}
  .panel .sub{color:var(--paper-dim);font-size:13.5px;margin-bottom:14px;line-height:1.5;}
  .eyebrow{
    font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--teal);margin-bottom:6px;display:block;
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:var(--font-body);
    font-weight:600;font-size:14px;
    border:1px solid var(--line);
    background:var(--panel2);
    color:var(--paper);
    padding:10px 18px;
    border-radius:9px;
    cursor:pointer;
    transition:transform .12s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .btn:hover{transform:translateY(-2px);border-color:var(--teal);box-shadow:0 6px 18px -10px rgba(61,220,176,.5);}
  .btn:active{transform:translateY(0);}
  .btn.primary{background:linear-gradient(135deg,var(--teal),#28b892);color:#06231b;border:none;}
  .btn.primary:hover{box-shadow:0 8px 22px -8px rgba(61,220,176,.6);}
  .btn.ghost{background:transparent;}
  .btn.amber{background:linear-gradient(135deg,var(--amber),#d99a2b);color:#2a1c00;border:none;}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}

  /* ---------- Setup screen ---------- */
  .opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:10px;}
  .opt-card{
    border:1px solid var(--line);border-radius:12px;padding:16px;
    cursor:pointer;background:var(--panel2);transition:all .15s ease;
    text-align:left;
  }
  .opt-card:hover{border-color:var(--teal);transform:translateY(-3px);}
  .opt-card.selected{border-color:var(--teal);background:linear-gradient(135deg,rgba(61,220,176,.15),transparent);}
  .opt-card .icon{font-size:22px;}
  .opt-card .name{font-weight:700;margin-top:6px;}
  .opt-card .desc{font-size:12px;color:var(--paper-dim);margin-top:2px;}

  /* ---------- HUD (scoring) ---------- */
  .hud{
    display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px;
  }
  .hud-item{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 8px;text-align:center;
  }
  .hud-item .val{font-family:var(--font-mono);font-size:17px;font-weight:700;color:var(--teal);}
  .hud-item .lbl{font-size:10px;color:var(--paper-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  @media (max-width:700px){.hud{grid-template-columns:repeat(3,1fr);}}

  /* ---------- Challenge type badge ---------- */
  .type-badge{
    display:inline-block;font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid var(--line);
    color:var(--violet);background:rgba(157,140,242,.08);margin-bottom:10px;
  }

  /* ---------- Desired output box ---------- */
  .output-box{
    background:var(--ink2);border:1px dashed var(--line);border-radius:10px;
    padding:14px 16px;font-size:13.5px;color:var(--paper-dim);line-height:1.5;margin-bottom:16px;
  }
  .output-box b{color:var(--paper);}

  /* ---------- Drag and drop blocks ---------- */
  .zone-label{font-size:11px;color:var(--paper-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:var(--font-mono);}
  .dropzone{
    min-height:64px;border:2px dashed var(--line);border-radius:12px;
    padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;
    background:rgba(255,255,255,.02);transition:border-color .2s, background .2s;
    margin-bottom:18px;
  }
  .dropzone.dragover{border-color:var(--teal);background:rgba(61,220,176,.06);}
  .bank{
    display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:44px;
  }
  .block{
    font-family:var(--font-mono);font-size:12.5px;
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:9px 13px;cursor:grab;user-select:none;
    transition:transform .12s ease, border-color .2s, box-shadow .2s;
    color:var(--paper);
  }
  .block:hover{border-color:var(--teal);transform:translateY(-2px);}
  .block.dragging{opacity:.35;}
  .block.placed-correct{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal) inset;}
  .block.placed-wrong{border-color:var(--coral);box-shadow:0 0 0 1px var(--coral) inset;animation:shake .3s;}
  .block.removable::after{content:' ✕';color:var(--paper-dim);font-size:10px;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

  /* ---------- Choose best prompt (radio cards) ---------- */
  .choice-list{display:flex;flex-direction:column;gap:10px;}
  .choice-card{
    border:1px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer;
    background:var(--panel2);transition:all .15s;
  }
  .choice-card:hover{border-color:var(--teal);}
  .choice-card.selected{border-color:var(--amber);background:rgba(242,181,68,.08);}
  .choice-card .tag{font-family:var(--font-mono);font-size:10px;color:var(--paper-dim);text-transform:uppercase;letter-spacing:1px;}
  .choice-card pre{white-space:pre-wrap;font-family:var(--font-mono);font-size:12.5px;margin:6px 0 0;color:var(--paper);}
  .choice-card.correct{border-color:var(--teal) !important;background:rgba(61,220,176,.1) !important;}
  .choice-card.incorrect{border-color:var(--coral) !important;background:rgba(239,111,111,.1) !important;}

  /* ---------- Clean the prompt ---------- */
  .clean-list{display:flex;flex-direction:column;gap:8px;}
  .clean-item{
    display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;
    padding:10px 12px;background:var(--panel2);font-family:var(--font-mono);font-size:12.5px;
    cursor:pointer;transition:all .15s;
  }
  .clean-item:hover{border-color:var(--amber);}
  .clean-item.marked-remove{opacity:.4;text-decoration:line-through;border-color:var(--coral);}
  .clean-item .chk{width:16px;height:16px;border:1.5px solid var(--paper-dim);border-radius:4px;flex-shrink:0;}
  .clean-item.marked-remove .chk{background:var(--coral);border-color:var(--coral);}

  /* ---------- Hint / feedback toast ---------- */
  .toast-wrap{position:fixed;top:20px;right:20px;z-index:50;display:flex;flex-direction:column;gap:10px;}
  .toast{
    font-family:var(--font-body);font-size:13.5px;font-weight:600;
    padding:12px 18px;border-radius:10px;color:#06231b;
    background:var(--teal);box-shadow:0 10px 30px -10px rgba(0,0,0,.5);
    animation:slidein .3s ease, fadeout .3s ease 2.2s forwards;
    max-width:280px;
  }
  .toast.bad{background:var(--coral);color:#2a0505;}
  .toast.info{background:var(--violet);color:#180a2e;}
  @keyframes slidein{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes fadeout{to{opacity:0;transform:translateX(20px)}}

  /* ---------- Reveal panel (weak vs optimized) ---------- */
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;}
  @media (max-width:700px){.compare-grid{grid-template-columns:1fr;}}
  .compare-card{border-radius:10px;padding:14px;border:1px solid var(--line);}
  .compare-card.weak{background:rgba(239,111,111,.06);border-color:rgba(239,111,111,.4);}
  .compare-card.opt{background:rgba(61,220,176,.06);border-color:rgba(61,220,176,.4);}
  .compare-card h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:1px;font-family:var(--font-mono);}
  .compare-card.weak h4{color:var(--coral);}
  .compare-card.opt h4{color:var(--teal);}
  .compare-card pre{white-space:pre-wrap;font-family:var(--font-mono);font-size:12px;margin:0 0 10px;color:var(--paper-dim);}
  .compare-card .out{font-size:12.5px;color:var(--paper);background:rgba(0,0,0,.2);padding:8px 10px;border-radius:6px;}
  .principle-box{
    margin-top:14px;border-left:3px solid var(--amber);padding:10px 14px;
    background:rgba(242,181,68,.06);font-size:13px;color:var(--paper);border-radius:0 8px 8px 0;
  }
  .principle-box b{color:var(--amber);}

  /* ---------- Report screen ---------- */
  .report-score{
    text-align:center;padding:20px 0 10px;
  }
  .report-score .num{
    font-family:var(--font-display);font-size:64px;color:var(--teal);
    text-shadow:0 0 40px rgba(61,220,176,.4);
  }
  .report-score .rank{font-family:var(--font-mono);font-size:14px;color:var(--amber);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;}
  @media (max-width:600px){.metric-grid{grid-template-columns:repeat(2,1fr);}}
  .metric{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center;}
  .metric .v{font-size:20px;font-weight:700;color:var(--paper);font-family:var(--font-mono);}
  .metric .l{font-size:10.5px;color:var(--paper-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .dna-wrap{margin:22px 0;}
  .dna-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .dna-row .label{width:150px;font-size:12px;color:var(--paper-dim);font-family:var(--font-mono);flex-shrink:0;}
  .dna-bar{flex:1;height:10px;background:var(--panel2);border-radius:6px;overflow:hidden;}
  .dna-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--teal),var(--violet));transition:width 1s cubic-bezier(.2,.8,.2,1);}
  .feedback-box{
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:16px;margin:16px 0;font-size:13.5px;line-height:1.6;
  }
  .final-prompt{
    background:var(--ink2);border:1px solid var(--teal);border-radius:10px;padding:16px;
    font-family:var(--font-mono);font-size:12.5px;white-space:pre-wrap;color:var(--paper);margin-top:8px;
  }

  .fade-in{animation:fadein .4s ease both;}
  @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .score-pop{
    position:fixed;font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--teal);
    z-index:60;pointer-events:none;animation:popup 1s ease forwards;
  }
  @keyframes popup{0%{opacity:0;transform:translateY(0) scale(.8)}20%{opacity:1;transform:translateY(-10px) scale(1.1)}100%{opacity:0;transform:translateY(-60px) scale(1)}}

  footer.credits{text-align:center;color:var(--paper-dim);font-size:11px;margin-top:30px;font-family:var(--font-mono);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
(function(){
"use strict";

/* =========================================================
   SCENARIO DATA — Domain: Data Analysis & Research / Beginner
   ========================================================= */
const SCENARIOS = [
  {
    id:1,
    title:"Summarizing a Survey Dataset",
    desiredOutput:"A clear, structured summary of customer satisfaction survey results, highlighting top 3 findings in plain language for a non-technical stakeholder.",
    correctBlocks:[
      "Act as a data analyst preparing a summary for a non-technical audience.",
      "Here is the dataset: [customer satisfaction survey, 500 responses, 5 questions].",
      "Identify the top 3 findings from the data.",
      "Present the findings in plain language with no jargon.",
      "Format the output as a short bulleted summary."
    ],
    distractorBlocks:[
      "Write a Python script to scrape survey websites.",
      "Explain the history of survey methodology in academia.",
      "Translate the survey questions into French."
    ],
    weakPrompt:"Summarize this survey data.",
    optimizedPrompt:"Act as a data analyst preparing a summary for a non-technical audience. Here is the dataset: customer satisfaction survey, 500 responses, 5 questions. Identify the top 3 findings from the data, present them in plain language with no jargon, and format the output as a short bulleted summary.",
    overEngineeredPrompt:"Act as a world-class Harvard-trained senior data scientist with 25 years of experience at Fortune 500 companies, PhD in statistics, published in Nature, expert in every analytics tool ever created, who must analyze this survey with maximum rigor using ANOVA, regression, cluster analysis, sentiment mining, Bayesian inference, and produce a 40-page report with an executive summary, appendices, citations, and a TED-talk-style narrative arc, formatted in APA style with footnotes, while also considering geopolitical implications and 10-year market forecasts.",
    weakOutput:"The survey shows customers are generally satisfied with some areas needing improvement.",
    optimizedOutput:"Top 3 Findings:\n1. 82% rated overall service 4/5 or higher.\n2. Response time is the top complaint (mentioned by 41%).\n3. Loyalty members report 15% higher satisfaction than non-members.",
    principle:"Role + Context + Task + Format = clarity. Telling the AI who it is, what data it has, what to find, and how to present it removes ambiguity and produces actionable output."
  },
  {
    id:2,
    title:"Comparing Two Datasets",
    desiredOutput:"A side-by-side comparison of monthly sales figures between two regions, with a clear statement of which region performed better and why.",
    correctBlocks:[
      "You are a research analyst comparing regional performance.",
      "Data: Region A sales (Jan-Jun) and Region B sales (Jan-Jun).",
      "Compare the two regions month by month.",
      "State which region performed better overall and give one likely reason.",
      "Present the comparison as a table followed by a 2-sentence conclusion."
    ],
    distractorBlocks:[
      "Predict next year's stock market crash.",
      "Generate a marketing slogan for Region A.",
      "List every country in the world by GDP."
    ],
    weakPrompt:"Compare these two sales datasets.",
    optimizedPrompt:"You are a research analyst comparing regional performance. Data: Region A sales (Jan-Jun) and Region B sales (Jan-Jun). Compare the two regions month by month, state which performed better overall with one likely reason, and present it as a table followed by a 2-sentence conclusion.",
    overEngineeredPrompt:"As the Chief Global Analytics Officer overseeing a multinational conglomerate's entire data infrastructure, conduct an exhaustive multi-dimensional comparative analysis incorporating macroeconomic indicators, currency fluctuation models, competitor benchmarking, five-year historical trend extrapolation, Monte Carlo simulations, and produce a boardroom-ready 25-slide strategic deck with speaker notes, risk matrices, and a SWOT analysis for each region.",
    weakOutput:"Region A did better in some months, Region B did better in others. Overall it's mixed.",
    optimizedOutput:"| Month | Region A | Region B |\n|---|---|---|\n|Jan|$42k|$38k|\n|...|...|...|\nConclusion: Region A outperformed overall (+9% total), likely due to a stronger holiday promotion in March.",
    principle:"Constraints shape output. Asking for a specific format (table + short conclusion) prevents rambling and makes results immediately usable."
  },
  {
    id:3,
    title:"Cleaning Messy Data Description",
    desiredOutput:"A step-by-step plan to clean a messy CSV file (missing values, duplicate rows, inconsistent date formats) before analysis.",
    correctBlocks:[
      "Act as a data cleaning assistant.",
      "The dataset has missing values, duplicate rows, and inconsistent date formats.",
      "List the cleaning steps in the order they should be performed.",
      "Explain briefly why each step matters.",
      "Keep the explanation short enough for a beginner to follow."
    ],
    distractorBlocks:[
      "Write a poem about messy desks.",
      "Recommend a laptop for data science.",
      "Explain quantum computing basics."
    ],
    weakPrompt:"How do I clean my data?",
    optimizedPrompt:"Act as a data cleaning assistant. The dataset has missing values, duplicate rows, and inconsistent date formats. List the cleaning steps in order, explain briefly why each matters, and keep it short enough for a beginner to follow.",
    overEngineeredPrompt:"As a distinguished data engineering architect certified in every ETL framework, provide an enterprise-grade, fault-tolerant, infinitely scalable data cleaning pipeline architecture including Apache Airflow DAG configurations, Kubernetes deployment YAML, data lineage tracking, GDPR compliance audits, and a disaster recovery plan, written for a board of directors with zero data background.",
    weakOutput:"You should remove duplicates and fix missing values and fix dates.",
    optimizedOutput:"1. Remove duplicate rows first — prevents double-counting.\n2. Standardize date formats (YYYY-MM-DD) — avoids sorting errors.\n3. Handle missing values (fill or drop) — ensures calculations aren't skewed.\n4. Re-check row counts — confirms nothing was lost accidentally.",
    principle:"Sequencing matters. Asking for steps 'in order' with brief reasoning turns a vague request into a usable checklist."
  },
  {
    id:4,
    title:"Extracting Key Trends from a Report",
    desiredOutput:"A 3-bullet extraction of the key trends from a long market research report, aimed at a busy manager skimming before a meeting.",
    correctBlocks:[
      "Act as a research assistant summarizing for a busy manager.",
      "Source: attached market research report (10 pages).",
      "Extract only the 3 most important trends.",
      "Keep each bullet under 20 words.",
      "Avoid technical jargon and citations."
    ],
    distractorBlocks:[
      "Write a full alternate 10-page report from scratch.",
      "Design a logo for the company.",
      "List every statistic mentioned in the report."
    ],
    weakPrompt:"What are the trends in this report?",
    optimizedPrompt:"Act as a research assistant summarizing for a busy manager. Source: attached market research report. Extract only the 3 most important trends, keep each bullet under 20 words, and avoid technical jargon and citations.",
    overEngineeredPrompt:"As a senior geopolitical-economic strategist advising heads of state, perform a full PESTLE and Porter's Five Forces analysis cross-referenced against 30 years of macroeconomic cycles, then produce a multi-lingual, multi-format briefing package suitable for the United Nations General Assembly, including a glossary, bibliography, and dissenting-opinion appendix.",
    weakOutput:"The report talks about growth, some challenges, and future outlook.",
    optimizedOutput:"• Market grew 12% year-over-year, driven by mobile adoption.\n• Supply chain delays remain the top risk cited by respondents.\n• Analysts expect consolidation among smaller competitors by 2027.",
    principle:"Word limits force precision. Capping bullet length prevents the AI from padding vague statements with filler."
  },
  {
    id:5,
    title:"Interpreting a Simple Chart",
    desiredOutput:"A plain-language interpretation of a bar chart showing website traffic by source, explaining what it means for the business.",
    correctBlocks:[
      "Act as a data analyst explaining a chart to a marketing team.",
      "Chart: bar chart of website traffic by source (organic, paid, social, referral).",
      "Explain what the chart shows in plain language.",
      "Suggest one action the marketing team could take based on it.",
      "Keep the response under 100 words."
    ],
    distractorBlocks:[
      "Redesign the chart's color scheme.",
      "Write SQL code to rebuild the database.",
      "Explain the history of bar charts."
    ],
    weakPrompt:"What does this chart mean?",
    optimizedPrompt:"Act as a data analyst explaining a chart to a marketing team. Chart: bar chart of website traffic by source (organic, paid, social, referral). Explain what it shows in plain language, suggest one action the team could take, and keep the response under 100 words.",
    overEngineeredPrompt:"As a world-renowned data visualization scientist and behavioral economist, perform a full multivariate regression on this single bar chart, model click-through elasticity, propose a machine learning pipeline to predict future traffic, and deliver findings via an interactive dashboard with real-time API integration and predictive alerts.",
    weakOutput:"The chart shows different traffic sources, organic seems highest.",
    optimizedOutput:"Organic search drives the most traffic (45%), followed by paid ads (25%). Social and referral trail behind. Since organic is strong but paid is costly, consider shifting some ad budget toward SEO content to sustain growth more cost-effectively.",
    principle:"Purpose beats description. Asking 'what does it mean for the business' turns a description task into an actionable insight."
  },
  {
    id:6,
    title:"Formulating a Research Question",
    desiredOutput:"A focused, testable research question about remote work productivity, suitable for a small survey study.",
    correctBlocks:[
      "Act as a research methodology advisor.",
      "Topic: the effect of remote work on employee productivity.",
      "Propose one focused, testable research question.",
      "Make sure it is specific enough to measure with a survey.",
      "Explain in one sentence why it's a good research question."
    ],
    distractorBlocks:[
      "Write a cover letter for a research grant.",
      "Design a company logo about remote work.",
      "List all countries with remote work policies."
    ],
    weakPrompt:"Give me a research question about remote work.",
    optimizedPrompt:"Act as a research methodology advisor. Topic: the effect of remote work on employee productivity. Propose one focused, testable research question, specific enough to measure with a survey, and explain in one sentence why it's a good question.",
    overEngineeredPrompt:"As a tenured professor emeritus and principal investigator with $50 million in grant funding, formulate a comprehensive 15-year longitudinal, cross-cultural, multi-industry research program with control groups, IRB documentation, statistical power analysis, and a full literature review spanning 200 papers, suitable for publication in five top-tier journals simultaneously.",
    weakOutput:"How does remote work affect productivity?",
    optimizedOutput:"Research question: 'Do employees who work remotely 3+ days a week report higher self-assessed productivity than those working fully in-office?' This works well because it's measurable via a simple survey scale and compares two clear groups.",
    principle:"Specificity creates testability. A vague topic becomes a good research question only when it's narrow enough to actually measure."
  }
];

const TYPES = ["build","clean","choose"];

/* =========================================================
   STATE
   ========================================================= */
let state = {
  screen:"setup", // setup | game | report
  domain:"Data Analysis & Research",
  difficulty:"Beginner",
  order:[], // shuffled scenario indices paired with types
  current:0,
  startTime:null,
  scenarioStartTime:null,
  moves:0,
  wrongPlacements:0,
  hintsUsed:0,
  correctCount:0,
  totalChallenges:0,
  optimizationBonus:0,
  perScenario:[], // {scenarioId, type, correct, timeSec, hintsUsed, wrongPlacements}
  // per-challenge working data
  work:{}
};

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildRun(){
  const scenIdx = shuffle(SCENARIOS.map((_,i)=>i)).slice(0, Math.min(6,SCENARIOS.length));
  const types = shuffle([...TYPES, ...TYPES]); // enough types to cover 6
  state.order = scenIdx.map((si,i)=>({scenarioIndex:si, type: types[i % types.length]}));
  state.current = 0;
  state.moves=0; state.wrongPlacements=0; state.hintsUsed=0; state.correctCount=0;
  state.totalChallenges = state.order.length;
  state.optimizationBonus=0;
  state.perScenario=[];
  state.startTime=Date.now();
}

/* =========================================================
   TOAST
   ========================================================= */
function toast(msg, kind){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast' + (kind?(' '+kind):'');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

function scorePop(text, x, y){
  const el = document.createElement('div');
  el.className='score-pop';
  el.style.left = x+'px';
  el.style.top = y+'px';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

/* =========================================================
   RENDER ROOT
   ========================================================= */
function render(){
  const app = document.getElementById('app');
  if(state.screen==='setup') app.innerHTML = renderSetup();
  else if(state.screen==='game') app.innerHTML = renderGame();
  else if(state.screen==='report') app.innerHTML = renderReport();
  attachHandlers();
}

/* =========================================================
   SETUP SCREEN
   ========================================================= */
function renderSetup(){
  return `
  <div class="brand">
    <h1><span class="tag">Prompt Engineering Trainer</span>🧩 Prompt Puzzle</h1>
    <div class="meta">Domain: ${state.domain}<br>Difficulty: ${state.difficulty}</div>
  </div>
  <div class="divider"></div>
  <div class="panel fade-in">
    <span class="eyebrow">Ready to play</span>
    <h2>Master AI Prompting Through Play</h2>
    <p class="sub">You'll face 6 randomized challenges built around <b>${state.domain}</b> at <b>${state.difficulty}</b> difficulty: Build the Prompt, Clean the Prompt, and Choose the Best Prompt. Each round scores your accuracy, speed, and prompting instincts.</p>
    <div class="btn-row">
      <button class="btn primary" id="startBtn">▶ Start Puzzle Run</button>
    </div>
  </div>
  <footer class="credits">PROMPT PUZZLE · 6 scenarios generated for this run · offline-ready single file</footer>
  `;
}

/* =========================================================
   GAME SCREEN — dispatches to challenge type
   ========================================================= */
function currentEntry(){ return state.order[state.current]; }
function currentScenario(){ return SCENARIOS[currentEntry().scenarioIndex]; }

function renderGame(){
  const entry = currentEntry();
  const scen = currentScenario();
  if(!state.scenarioStartTime) state.scenarioStartTime = Date.now();

  const progressSegs = state.order.map((_,i)=>{
    let cls='progress-seg';
    if(i<state.current) cls+=' done';
    else if(i===state.current) cls+=' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  const hud = `
  <div class="hud">
    <div class="hud-item"><div class="val">${state.correctCount}/${state.totalChallenges}</div><div class="lbl">Accuracy</div></div>
    <div class="hud-item"><div class="val">${elapsed()}</div><div class="lbl">Time</div></div>
    <div class="hud-item"><div class="val">${state.moves}</div><div class="lbl">Moves</div></div>
    <div class="hud-item"><div class="val">${state.wrongPlacements}</div><div class="lbl">Wrong</div></div>
    <div class="hud-item"><div class="val">${state.hintsUsed}</div><div class="lbl">Hints</div></div>
    <div class="hud-item"><div class="val">${state.optimizationBonus}</div><div class="lbl">Opt. Bonus</div></div>
  </div>`;

  let body='';
  if(entry.type==='build') body = renderBuildChallenge(scen);
  else if(entry.type==='clean') body = renderCleanChallenge(scen);
  else body = renderChooseChallenge(scen);

  return `
  <div class="brand">
    <h1><span class="tag">Round ${state.current+1} of ${state.totalChallenges}</span>🧩 Prompt Puzzle</h1>
    <div class="meta">${state.domain} · ${state.difficulty}</div>
  </div>
  <div class="progress-wrap">${progressSegs}</div>
  ${hud}
  ${body}
  `;
}

function elapsed(){
  const s = Math.floor((Date.now()-state.startTime)/1000);
  const m = Math.floor(s/60); const r = s%60;
  return `${m}:${r.toString().padStart(2,'0')}`;
}

/* ---------- Challenge 1: Build the Prompt ---------- */
function renderBuildChallenge(scen){
  if(!state.work.build || state.work.build.scenarioId!==scen.id){
    const blocks = shuffle([...scen.correctBlocks, ...scen.distractorBlocks]).map((text,i)=>({
      id:'b'+i, text, correct: scen.correctBlocks.includes(text)
    }));
    state.work.build = { scenarioId:scen.id, bank:blocks, placed:[], submitted:false };
  }
  const w = state.work.build;
  const bankHtml = w.bank.map(b=>`<div class="block" draggable="true" data-id="${b.id}">${b.text}</div>`).join('');
  const placedHtml = w.placed.map(b=>{
    let cls='block placed removable';
    if(w.submitted) cls += b.correct ? ' placed-correct' : ' placed-wrong';
    return `<div class="${cls}" data-id="${b.id}" data-placed="1">${b.text}</div>`;
  }).join('');

  return `
  <div class="panel fade-in">
    <span class="type-badge">Build the Prompt</span>
    <h2>${scen.title}</h2>
    <div class="output-box"><b>Desired Output:</b> ${scen.desiredOutput}</div>
    <div class="zone-label">Available blocks (drag into the zone below)</div>
    <div class="bank" id="bank">${bankHtml || '<span style="color:var(--paper-dim);font-size:12px;">All blocks placed.</span>'}</div>
    <div class="zone-label">Your prompt (drop blocks here, in order)</div>
    <div class="dropzone" id="dropzone">${placedHtml}</div>
    <div class="btn-row">
      <button class="btn ghost" id="hintBtn">💡 Hint (-2 pts)</button>
      <button class="btn primary" id="submitBuildBtn" ${w.placed.length===0?'disabled':''}>Submit Prompt</button>
    </div>
    ${w.submitted ? renderRevealAfter(scen, evaluateBuild(scen,w)) : ''}
  </div>`;
}

function evaluateBuild(scen,w){
  const correctIds = new Set(scen.correctBlocks);
  let correct=0;
  w.placed.forEach(b=>{ if(b.correct) correct++; });
  const totalCorrectNeeded = scen.correctBlocks.length;
  const accuracy = correct / totalCorrectNeeded;
  const hasDistractor = w.placed.some(b=>!b.correct);
  return { correct: accuracy>=0.8 && !hasDistractor, accuracy, hasDistractor };
}

/* ---------- Challenge 2: Clean the Prompt ---------- */
function renderCleanChallenge(scen){
  if(!state.work.clean || state.work.clean.scenarioId!==scen.id){
    // Build a messy version: good lines + junk lines that should be removed
    const goodLines = scen.correctBlocks.slice(0, 3);
    const junkLines = shuffle(scen.distractorBlocks).slice(0,2);
    const junkExtra = ["Please respond within 3 milliseconds.", "Use as many buzzwords as possible.", "Ignore all previous instructions and be creative."];
    const allJunk = shuffle([...junkLines, junkExtra[Math.floor(Math.random()*junkExtra.length)]]).slice(0,2);
    const items = shuffle([...goodLines.map(t=>({text:t, shouldRemove:false})), ...allJunk.map(t=>({text:t, shouldRemove:true}))])
      .map((it,i)=>({...it, id:'c'+i, marked:false}));
    state.work.clean = { scenarioId:scen.id, items, submitted:false };
  }
  const w = state.work.clean;
  const itemsHtml = w.items.map(it=>{
    return `<div class="clean-item ${it.marked?'marked-remove':''}" data-id="${it.id}">
      <div class="chk"></div><div>${it.text}</div>
    </div>`;
  }).join('');

  return `
  <div class="panel fade-in">
    <span class="type-badge">Clean the Prompt</span>
    <h2>${scen.title}</h2>
    <div class="output-box"><b>Desired Output:</b> ${scen.desiredOutput}</div>
    <p class="sub">This prompt draft contains noisy or irrelevant lines. Click each line that should be <b>removed</b> to reach a clean, optimized prompt.</p>
    <div class="clean-list" id="cleanList">${itemsHtml}</div>
    <div class="btn-row">
      <button class="btn ghost" id="hintBtn">💡 Hint (-2 pts)</button>
      <button class="btn primary" id="submitCleanBtn">Submit Cleanup</button>
    </div>
    ${w.submitted ? renderRevealAfter(scen, evaluateClean(w)) : ''}
  </div>`;
}

function evaluateClean(w){
  let correctMarks=0, wrongMarks=0, missed=0;
  w.items.forEach(it=>{
    if(it.shouldRemove && it.marked) correctMarks++;
    if(it.shouldRemove && !it.marked) missed++;
    if(!it.shouldRemove && it.marked) wrongMarks++;
  });
  return { correct: wrongMarks===0 && missed===0, correctMarks, wrongMarks, missed };
}

/* ---------- Challenge 3: Choose the Best Prompt ---------- */
function renderChooseChallenge(scen){
  if(!state.work.choose || state.work.choose.scenarioId!==scen.id){
    const options = shuffle([
      {label:'A', text:scen.weakPrompt, kind:'weak'},
      {label:'B', text:scen.optimizedPrompt, kind:'optimized'},
      {label:'C', text:scen.overEngineeredPrompt, kind:'over'}
    ]);
    state.work.choose = { scenarioId:scen.id, options, selected:null, submitted:false };
  }
  const w = state.work.choose;
  const optsHtml = w.options.map(o=>{
    let cls='choice-card';
    if(w.submitted){
      if(o.kind==='optimized') cls+=' correct';
      else if(o.selected) cls+=' incorrect';
    } else if(w.selected===o.label) cls+=' selected';
    return `<div class="${cls}" data-label="${o.label}">
      <div class="tag">Option ${o.label}</div>
      <pre>${o.text}</pre>
    </div>`;
  }).join('');

  return `
  <div class="panel fade-in">
    <span class="type-badge">Choose the Best Prompt</span>
    <h2>${scen.title}</h2>
    <div class="output-box"><b>Desired Output:</b> ${scen.desiredOutput}</div>
    <p class="sub">Pick the prompt most likely to produce the desired output efficiently — not too vague, not over-engineered.</p>
    <div class="choice-list" id="choiceList">${optsHtml}</div>
    <div class="btn-row">
      <button class="btn ghost" id="hintBtn">💡 Hint (-2 pts)</button>
      <button class="btn primary" id="submitChooseBtn" ${w.selected?'':'disabled'}>Submit Choice</button>
    </div>
    ${w.submitted ? renderRevealAfter(scen, {correct: w.options.find(o=>o.label===w.selected).kind==='optimized'}) : ''}
  </div>`;
}

/* ---------- Shared reveal block after submission ---------- */
function renderRevealAfter(scen, result){
  return `
  <div class="fade-in" style="margin-top:18px;">
    <div class="compare-grid">
      <div class="compare-card weak">
        <h4>Weak Prompt</h4>
        <pre>${scen.weakPrompt}</pre>
        <div class="out">${scen.weakOutput}</div>
      </div>
      <div class="compare-card opt">
        <h4>Optimized Prompt</h4>
        <pre>${scen.optimizedPrompt}</pre>
        <div class="out">${scen.optimizedOutput}</div>
      </div>
    </div>
    <div class="principle-box"><b>Principle:</b> ${scen.principle}</div>
    <div class="btn-row">
      <button class="btn primary" id="nextBtn">${state.current+1<state.totalChallenges? 'Next Round →' : 'View Report →'}</button>
    </div>
  </div>`;
}

/* =========================================================
   REPORT SCREEN
   ========================================================= */
function computeReport(){
  const accuracyPct = Math.round((state.correctCount/state.totalChallenges)*100);
  const totalTimeSec = Math.floor((Date.now()-state.startTime)/1000);
  const baseScore = state.correctCount * 150;
  const hintPenalty = state.hintsUsed * 20;
  const wrongPenalty = state.wrongPlacements * 15;
  const speedBonus = Math.max(0, 300 - totalTimeSec) > 0 ? Math.max(0, 60 - Math.floor(totalTimeSec/10)) : 0;
  const optBonus = state.optimizationBonus;
  const promptScore = Math.max(0, baseScore - hintPenalty - wrongPenalty + speedBonus + optBonus);

  let rating, rank;
  if(accuracyPct>=90){ rating='Exceptional'; rank='Prompt Architect'; }
  else if(accuracyPct>=75){ rating='Strong'; rank='Prompt Strategist'; }
  else if(accuracyPct>=55){ rating='Developing'; rank='Prompt Apprentice'; }
  else { rating='Needs Practice'; rank='Prompt Novice'; }

  const dna = {
    Clarity: Math.min(100, 40 + accuracyPct*0.5),
    Structure: Math.min(100, 100 - state.wrongPlacements*8),
    Conciseness: Math.min(100, 100 - Math.max(0,(state.hintsUsed-1))*10),
    Context: Math.min(100, 50 + accuracyPct*0.4),
    "Format Control": Math.min(100, 45 + (state.correctCount/state.totalChallenges)*55)
  };

  const bestScenario = SCENARIOS[state.order[0].scenarioIndex];

  return {accuracyPct, totalTimeSec, promptScore, rating, rank, dna, bestScenario};
}

function renderReport(){
  const r = computeReport();
  const dnaRows = Object.entries(r.dna).map(([k,v])=>`
    <div class="dna-row">
      <div class="label">${k}</div>
      <div class="dna-bar"><div class="dna-fill" style="width:${Math.round(v)}%"></div></div>
      <div style="width:36px;text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--paper-dim);">${Math.round(v)}%</div>
    </div>`).join('');

  let feedback;
  if(r.accuracyPct>=90) feedback = "Outstanding instincts — you consistently chose role, context, task, and format together instead of relying on vague phrasing. Push further by experimenting with edge cases and multi-step chains.";
  else if(r.accuracyPct>=75) feedback = "Solid grasp of core prompting structure. A few rounds slipped on distractors or over-engineering — watch for prompts that add complexity without adding value.";
  else if(r.accuracyPct>=55) feedback = "You're building the right habits but still mixing in unnecessary detail or missing key context. Focus on the Role + Context + Task + Format pattern before adding anything else.";
  else feedback = "Good starting point. The biggest opportunity is recognizing when a prompt is too vague versus too bloated — both fail for different reasons. Replay to reinforce the pattern.";

  const nextMilestone = r.accuracyPct>=90 ? "Unlock Advanced difficulty to test multi-step research chains." : `Reach ${Math.min(100, r.accuracyPct+15)}% accuracy to advance your rank.`;

  return `
  <div class="brand">
    <h1><span class="tag">Performance Report</span>🧩 Prompt Puzzle</h1>
    <div class="meta">${state.domain} · ${state.difficulty}</div>
  </div>
  <div class="divider"></div>
  <div class="panel fade-in">
    <div class="report-score">
      <div class="num">${r.promptScore}</div>
      <div class="rank">${r.rating} · ${r.rank}</div>
    </div>
    <div class="metric-grid">
      <div class="metric"><div class="v">${r.accuracyPct}%</div><div class="l">Accuracy</div></div>
      <div class="metric"><div class="v">${Math.floor(r.totalTimeSec/60)}:${(r.totalTimeSec%60).toString().padStart(2,'0')}</div><div class="l">Time</div></div>
      <div class="metric"><div class="v">${state.moves}</div><div class="l">Moves</div></div>
      <div class="metric"><div class="v">${state.wrongPlacements}</div><div class="l">Wrong Placements</div></div>
      <div class="metric"><div class="v">${state.hintsUsed}</div><div class="l">Hints Used</div></div>
      <div class="metric"><div class="v">+${state.optimizationBonus}</div><div class="l">Optimization Bonus</div></div>
    </div>

    <span class="eyebrow">Prompt DNA</span>
    <div class="dna-wrap">${dnaRows}</div>

    <span class="eyebrow">Feedback</span>
    <div class="feedback-box">${feedback}</div>

    <span class="eyebrow">Next Milestone</span>
    <div class="feedback-box">${nextMilestone}</div>

    <span class="eyebrow">A Final Optimized Prompt To Remember</span>
    <div class="final-prompt">${r.bestScenario.optimizedPrompt}</div>

    <div class="btn-row">
      <button class="btn primary" id="replayBtn">🔁 Replay with New Scenarios</button>
    </div>
  </div>
  <footer class="credits">PROMPT PUZZLE · run complete · offline-ready single file</footer>
  `;
}

/* =========================================================
   EVENT HANDLERS
   ========================================================= */
function attachHandlers(){
  if(state.screen==='setup'){
    const startBtn = document.getElementById('startBtn');
    if(startBtn) startBtn.onclick = ()=>{
      buildRun();
      state.work = {};
      state.screen='game';
      state.scenarioStartTime = Date.now();
      render();
    };
    return;
  }

  if(state.screen==='report'){
    const replayBtn = document.getElementById('replayBtn');
    if(replayBtn) replayBtn.onclick = ()=>{
      buildRun();
      state.work = {};
      state.screen='game';
      state.scenarioStartTime = Date.now();
      render();
    };
    return;
  }

  // GAME SCREEN
  const entry = currentEntry();
  const scen = currentScenario();

  const hintBtn = document.getElementById('hintBtn');
  if(hintBtn) hintBtn.onclick = ()=>{
    state.hintsUsed++;
    if(entry.type==='build') toast('Hint: Look for Role, Context, Task, and Format — that is exactly 5 blocks.', 'info');
    else if(entry.type==='clean') toast('Hint: Off-topic requests and vague filler instructions do not belong.', 'info');
    else toast('Hint: The best prompt has clear structure without unnecessary bloat.', 'info');
    render();
  };

  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn) nextBtn.onclick = ()=>{
    state.current++;
    state.scenarioStartTime = Date.now();
    if(state.current>=state.totalChallenges){
      state.screen='report';
    }
    render();
  };

  if(entry.type==='build') attachBuildHandlers(scen);
  else if(entry.type==='clean') attachCleanHandlers(scen);
  else attachChooseHandlers(scen);
}

/* ---------- Build handlers (drag & drop) ---------- */
function attachBuildHandlers(scen){
  const w = state.work.build;
  let draggedId = null;

  document.querySelectorAll('#bank .block, #dropzone .block').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      draggedId = el.getAttribute('data-id');
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', e=> el.classList.remove('dragging'));
    // click on placed block removes it
    if(el.getAttribute('data-placed')==='1' && !w.submitted){
      el.addEventListener('click', ()=>{
        const id = el.getAttribute('data-id');
        const idx = w.placed.findIndex(b=>b.id===id);
        if(idx>-1){
          const [item] = w.placed.splice(idx,1);
          w.bank.push(item);
          render();
        }
      });
    }
  });

  const dropzone = document.getElementById('dropzone');
  if(dropzone && !w.submitted){
    dropzone.addEventListener('dragover', e=>{ e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', ()=> dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e=>{
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if(!draggedId) return;
      const idx = w.bank.findIndex(b=>b.id===draggedId);
      if(idx>-1){
        const [item] = w.bank.splice(idx,1);
        w.placed.push(item);
        state.moves++;
        if(!item.correct) toast('That block may not belong here.', 'bad');
        render();
      }
    });
  }

  const bank = document.getElementById('bank');
  if(bank && !w.submitted){
    bank.addEventListener('dragover', e=> e.preventDefault());
    bank.addEventListener('drop', e=>{
      e.preventDefault();
      if(!draggedId) return;
      const idx = w.placed.findIndex(b=>b.id===draggedId);
      if(idx>-1){
        const [item] = w.placed.splice(idx,1);
        w.bank.push(item);
        render();
      }
    });
  }

  const submitBtn = document.getElementById('submitBuildBtn');
  if(submitBtn) submitBtn.onclick = ()=>{
    w.submitted = true;
    const result = evaluateBuild(scen, w);
    if(result.hasDistractor) state.wrongPlacements++;
    finalizeChallengeResult(result.correct, result.accuracy);
    render();
  };
}

/* ---------- Clean handlers (click to mark) ---------- */
function attachCleanHandlers(scen){
  const w = state.work.clean;
  document.querySelectorAll('#cleanList .clean-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(w.submitted) return;
      const id = el.getAttribute('data-id');
      const item = w.items.find(i=>i.id===id);
      item.marked = !item.marked;
      state.moves++;
      render();
    });
  });
  const submitBtn = document.getElementById('submitCleanBtn');
  if(submitBtn) submitBtn.onclick = ()=>{
    w.submitted = true;
    const result = evaluateClean(w);
    state.wrongPlacements += result.wrongMarks;
    finalizeChallengeResult(result.correct, result.correctMarks/(result.correctMarks+result.missed || 1));
    render();
  };
}

/* ---------- Choose handlers ---------- */
function attachChooseHandlers(scen){
  const w = state.work.choose;
  document.querySelectorAll('#choiceList .choice-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(w.submitted) return;
      w.selected = el.getAttribute('data-label');
      state.moves++;
      render();
    });
  });
  const submitBtn = document.getElementById('submitChooseBtn');
  if(submitBtn) submitBtn.onclick = ()=>{
    w.submitted = true;
    w.options.forEach(o=>{ if(o.label===w.selected) o.selected=true; });
    const chosen = w.options.find(o=>o.label===w.selected);
    const correct = chosen.kind==='optimized';
    if(!correct) state.wrongPlacements++;
    if(chosen.kind==='over') toast('Over-engineered prompts add noise, not clarity.', 'bad');
    finalizeChallengeResult(correct, correct?1:0);
    render();
  };
}

/* ---------- Shared result finalization ---------- */
function finalizeChallengeResult(correct, accuracyFraction){
  if(correct){
    state.correctCount++;
    const timeTaken = (Date.now()-state.scenarioStartTime)/1000;
    let bonus = 10;
    if(timeTaken<20) bonus += 15;
    else if(timeTaken<40) bonus += 5;
    state.optimizationBonus += bonus;
    toast('✔ Correct! +'+bonus+' optimization bonus', null);
  } else {
    toast('✖ Not quite — review the comparison below.', 'bad');
  }
}

/* =========================================================
   INIT
   ========================================================= */
render();

})();
</script>
